<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra 3D Fishing Casino - Professional Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .stats { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: auto; }
        .badge { background: rgba(0, 0, 0, 0.85); color: #ffd700; padding: 14px 24px; border-radius: 20px; border: 2px solid #ffd700; font-weight: 900; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .controls { position: absolute; bottom: 50px; width: 100%; text-align: center; pointer-events: auto; }
        #action-btn { padding: 22px 65px; font-size: 26px; font-weight: 900; color: white; background: linear-gradient(45deg, #ff4e50, #f9d423); border: 4px solid #fff; border-radius: 60px; cursor: pointer; box-shadow: 0 12px 30px rgba(0,0,0,0.6); text-transform: uppercase; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #action-btn:active { transform: scale(0.92); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        #action-btn:disabled { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }
        #profile-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); display: none; z-index: 200; color: white; text-align: center; padding-top: 80px; box-sizing: border-box; }
        .fish-popup { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 160px; transition: transform 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55); pointer-events: none; z-index: 150; }
        .profit-text { font-size: 28px; color: #00ff00; margin-top: 25px; font-weight: bold; text-shadow: 0 0 10px #000; }
        .menu-btn { width: 85%; padding: 22px; margin: 12px 0; border-radius: 20px; border: none; font-size: 20px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-gold { background: #ffd700; color: #000; box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3); }
        .btn-dark { background: #333; color: #fff; border: 1px solid #555; }
        .btn-red { background: #ff4d4d; color: #fff; margin-top: 40px; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; color: gold; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

<div id="loading">ГОТУЄМО СНАСТІ...</div>

<div class="ui-layer">
    <div class="stats">
        <div class="badge">💰 <span id="bal-hud">50</span> 🐟🪙</div>
        <div class="badge" onclick="toggleProfile(true)" style="cursor:pointer">👤 ПРОФІЛЬ</div>
    </div>
    <div id="fish-wrap" class="fish-popup">🐟</div>
    <div class="controls">
        <button id="action-btn" onclick="handleGame()">Закинути вудку</button>
    </div>
</div>

<div id="profile-screen">
    <h1 style="letter-spacing: 4px; color: gold;">КАБІНЕТ РИБАЛКИ</h1>
    <div style="font-size: 72px; color: white; margin: 40px 0; font-weight: 900; text-shadow: 0 0 20px rgba(255,255,255,0.2);">
        <span id="bal-prof">50</span> <span style="font-size: 24px; color: gold;">🐟🪙</span>
    </div>
    <button class="menu-btn btn-gold" onclick="tg.showAlert('Поповнення скоро буде доступне!')">ПОПОВНИТИ (1⭐ = 1🪙)</button>
    <button class="menu-btn btn-dark" onclick="tg.showAlert('Вивід монет у подарунки активовано!')">ВИВЕСТИ ПОДАРУНКИ 🎁</button>
    <button class="menu-btn btn-red" onclick="toggleProfile(false)">ПОВЕРНУТИСЯ ДО ОЗЕРА</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let balance = 50;
    let gameState = 'idle';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x00d2ff); // Яскраве блакитне небо
    scene.fog = new THREE.Fog(0x00d2ff, 10, 150);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
    scene.add(hemiLight);
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(30, 50, 20);
    sun.castShadow = true;
    scene.add(sun);

    // --- ПТАШКИ ---
    const birds = [];
    function createBird() {
        const birdGeo = new THREE.BufferGeometry();
        const v = new Float32Array([0,0,0, -0.2,0.1,-0.1, 0.2,0.1,-0.1]);
        birdGeo.setAttribute('position', new THREE.BufferAttribute(v, 3));
        const birdMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });
        const bird = new THREE.Mesh(birdGeo, birdMat);
        bird.position.set(Math.random()*100-50, 25 + Math.random()*10, -60 - Math.random()*40);
        scene.add(bird);
        birds.push({ mesh: bird, speed: 0.08 + Math.random()*0.1 });
    }
    for(let i=0; i<12; i++) createBird();

    // --- ВОДА ---
    const waterGeo = new THREE.PlaneGeometry(600, 600, 100, 100);
    const waterMat = new THREE.MeshPhongMaterial({
        color: 0x0055ff,
        transparent: true,
        opacity: 0.8,
        shininess: 250,
        specular: 0xffffff
    });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.rotation.x = -Math.PI / 2;
    water.position.y = -2; 
    scene.add(water);

    // --- МІСТОК (ВКОРОЧЕНИЙ) ---
    const bridgeGroup = new THREE.Group();
    const woodMat = new THREE.MeshStandardMaterial({ color: 0x4e342e });
    for(let i = 0; i < 6; i++) {
        const plankGeo = new THREE.BoxGeometry(5, 0.25, 1);
        const plank = new THREE.Mesh(plankGeo, woodMat);
        plank.position.z = -i * 1.1 + 8; 
        plank.receiveShadow = true;
        bridgeGroup.add(plank);
    }
    bridgeGroup.position.y = -1.8;
    scene.add(bridgeGroup);

    // --- РУКИ ТА ВУДКА ---
    const playerGroup = new THREE.Group();
    
    // Руки (Спрощені блоки)
    const armMat = new THREE.MeshStandardMaterial({ color: 0xe0ac69 });
    const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), armMat);
    leftArm.position.set(-0.4, -0.3, 0.5);
    const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), armMat);
    rightArm.position.set(0.4, -0.3, 0.5);
    playerGroup.add(leftArm, rightArm);

    // Вудка
    const rodMat = new THREE.MeshStandardMaterial({ color: 0x212121 });
    const rodBase = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 3), rodMat);
    rodBase.rotation.x = Math.PI / 2.5;
    rodBase.position.set(0.3, 0.1, -0.5);
    playerGroup.add(rodBase);

    // Леска
    const lineGeo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0.3, 1.2, -1.8),
        new THREE.Vector3(0, -1.8, -6)
    ]);
    const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
    const fishingLine = new THREE.Line(lineGeo, lineMat);
    playerGroup.add(fishingLine);

    // Поплавок
    const floatGeo = new THREE.SphereGeometry(0.1, 8, 8);
    const floatMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
    const float = new THREE.Mesh(floatGeo, floatMat);
    float.position.set(0, -1.9, -6);
    scene.add(float);

    scene.add(playerGroup);
    playerGroup.position.set(0, 0, 3.5);

    camera.position.set(0, 0, 5); 
    camera.lookAt(0, 0, -5);

    function playSound(freq, duration) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;
        
        const vertices = water.geometry.attributes.position.array;
        for (let i = 2; i < vertices.length; i += 3) {
            vertices[i] = Math.sin(time * 1.5 + i) * 0.08;
        }
        water.geometry.attributes.position.needsUpdate = true;

        birds.forEach(b => {
            b.mesh.position.x += b.speed;
            b.mesh.position.y += Math.sin(time * 2) * 0.02;
            if(b.mesh.position.x > 70) b.mesh.position.x = -70;
        });

        // Анімація поплавка на воді
        float.position.y = -1.9 + Math.sin(time * 2) * 0.05;

        if (gameState === 'biting') {
            playerGroup.rotation.x = Math.sin(time * 20) * 0.03;
            float.position.y -= 0.3; // Поплавок тоне
        } else {
            playerGroup.rotation.x = Math.sin(time * 0.5) * 0.01;
        }

        // Оновлення ліски
        const rodTip = new THREE.Vector3(0.3, 1.2, -1.8).applyMatrix4(playerGroup.matrixWorld);
        const linePositions = fishingLine.geometry.attributes.position.array;
        linePositions[0] = rodTip.x; linePositions[1] = rodTip.y; linePositions[2] = rodTip.z;
        linePositions[3] = float.position.x; linePositions[4] = float.position.y; linePositions[5] = float.position.z;
        fishingLine.geometry.attributes.position.needsUpdate = true;

        renderer.render(scene, camera);
    }
    
    setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 1000);
    animate();

    function updateUI() {
        document.getElementById('bal-hud').innerText = balance.toFixed(0);
        document.getElementById('bal-prof').innerText = balance.toFixed(0);
    }

    function handleGame() {
        const btn = document.getElementById('action-btn');
        const fishWrap = document.getElementById('fish-wrap');

        if (gameState === 'idle') {
            if (balance < 50) { tg.showAlert("Мало монет!"); return; }
            balance -= 50;
            updateUI();
            gameState = 'fishing';
            btn.innerText = "ЧЕКАЄМО...";
            btn.disabled = true;
            playSound(300, 0.3);

            setTimeout(() => {
                gameState = 'biting';
                btn.disabled = false;
                btn.innerText = "ПІДСІКАЙ!!!";
                btn.style.background = "linear-gradient(45deg, #ff0000, #990000)";
                tg.HapticFeedback.notificationOccurred('warning');
            }, Math.random() * 12000 + 4000);

        } else if (gameState === 'biting') {
            gameState = 'result';
            btn.style.display = 'none';
            playSound(500, 0.5);

            const roll = Math.random() * 100;
            let res = { e: '🩲', m: 0 }; 
            if (roll > 99.5) res = { e: '🦈', m: 50 };
            else if (roll > 96) res = { e: '🦞', m: 15 };
            else if (roll > 88) res = { e: '🦑', m: 8 };
            else if (roll > 75) res = { e: '🐡', m: 5 };
            else if (roll > 50) res = { e: '🐠', m: 1.8 };
            else if (roll > 25) res = { e: '🐟', m: 0.6 };
            else res = { e: '🩲', m: 0 };

            balance += Math.floor(50 * res.m);
            fishWrap.innerText = res.e;
            fishWrap.style.transform = "translate(-50%, -50%) scale(1)";
            
            setTimeout(() => {
                fishWrap.style.transform = "translate(-50%, -50%) scale(0)";
                btn.style.display = 'inline-block';
                btn.innerText = "Закинути вудку";
                btn.style.background = "linear-gradient(45deg, #ff4e50, #f9d423)";
                gameState = 'idle';
                updateUI();
            }, 3000);
        }
    }

    function toggleProfile(show) {
        document.getElementById('profile-screen').style.display = show ? 'block' : 'none';
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    tg.expand();
    updateUI();
</script>
</body>
</html>
