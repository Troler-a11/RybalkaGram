<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fishing 4D Pro - Pure Casino</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* Професійний HUD */
        .hud { 
            position: absolute; top: 20px; left: 20px; 
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
            color: #333; padding: 12px 25px; border-radius: 25px; 
            border: 3px solid #FFD700; pointer-events: auto; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex; align-items: center;
        }
        
        .btn-main { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 25px 80px; font-size: 28px; font-weight: 900; color: white;
            background: linear-gradient(#4CAF50, #2E7D32); border: none; border-radius: 60px;
            box-shadow: 0 10px 0 #1B5E20, 0 20px 30px rgba(0,0,0,0.3); pointer-events: auto; cursor: pointer;
            transition: all 0.1s;
        }
        .btn-main:active:not(:disabled) { transform: translateX(-50%) translateY(5px); box-shadow: 0 5px 0 #1B5E20; }
        .btn-main:disabled { background: #888; box-shadow: 0 10px 0 #555; }

        /* Окрема сторінка профілю */
        #profile-page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #f8f9fa; z-index: 2000; display: none; pointer-events: auto;
            flex-direction: column; align-items: center; padding-top: 60px;
        }
        .p-card {
            background: white; width: 85%; max-width: 450px; padding: 40px;
            border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center; border: 1px solid #eee;
        }
        .p-avatar { width: 130px; height: 130px; border-radius: 50%; border: 5px solid #FFD700; margin: 0 auto 20px; background-size: cover; }
        
        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; margin-top: 30px; }
        .btn-action { padding: 20px; border-radius: 20px; border: none; font-weight: 900; font-size: 20px; cursor: pointer; }
        .dep-btn { background: #0088cc; color: white; }
        .wd-btn { background: #28a745; color: white; }
        
        #catch-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 40px; border-radius: 35px; width: 85%; max-width: 420px;
            text-align: center; display: none; pointer-events: auto; z-index: 3000;
            box-shadow: 0 0 100px rgba(0,0,0,0.5); border: 4px solid #FFD700;
        }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1500; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div class="hud" onclick="showProfile()">
        <div id="mini-avatar" style="width:40px; height:40px; border-radius:50%; background:#ddd; margin-right:15px; border:2px solid #FFD700; background-size:cover;"></div>
        <div>
            <span id="u-name" style="font-weight:bold; font-size:14px;">@user</span><br>
            <span id="balance-val" style="font-size:22px; font-weight:900; color:#2E7D32;">50</span> ⭐️
        </div>
    </div>
    <div id="msg-box" style="position:absolute; top: 130px; width:100%; text-align:center; color:white; font-size:26px; font-weight:900; text-shadow:2px 2px 10px rgba(0,0,0,0.8);"></div>
    <button id="main-action" class="btn-main">ЗАКИД (50 ⭐️)</button>
</div>

<div id="profile-page">
    <div class="p-card">
        <div class="p-avatar" id="large-avatar"></div>
        <h1 id="full-u-name">@user</h1>
        <div style="font-size:40px; font-weight:900; color:#2E7D32; margin: 10px 0;"><span id="p-balance">50</span> ⭐️</div>
        <div class="btn-group">
            <button class="btn-action dep-btn" onclick="alert('Купівля через Telegram Stars...')">ПОПОВНИТИ ⭐️</button>
            <button class="btn-action wd-btn" onclick="withdraw()">ВИВЕСТИ (мін. 1000)</button>
        </div>
        <p style="margin-top:30px; color:#888; cursor:pointer;" onclick="hideProfile()">← ПОВЕРНУТИСЯ ДО ГРИ</p>
    </div>
</div>

<div id="overlay" class="overlay"></div>

<div id="catch-modal">
    <h1 id="f-name" style="font-size:36px; margin:0;">Золота рибка!</h1>
    <p id="f-info" style="font-size:20px; color:#666;"></p>
    <div id="f-price" style="font-size:48px; font-weight:900; margin:25px 0;"></div>
    <button class="btn-main" style="position:static; transform:none; width:100%;" onclick="hideModals()">ЗАБРАТИ</button>
</div>

<script>
/**
 * FISHING 4D SUPREME ENGINE
 * CORE GRAPHICS & CASINO LOGIC
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mainBtn = document.getElementById('main-action');
const msgBox = document.getElementById('msg-box');

let balance = 50;
let state = 'IDLE'; 
let width, height;
let wavePos = 0;
let rodDeg = 30;
let targetDeg = 30;
let catchAnim = { active: false, x: 0, y: 0, s: 0, o: 0, fish: null };

// КАЗИНО ШАНСИ
const fishDatabase = [
    { id: 'boot', name: 'Старий черевик', min: 0, max: 0, chance: 0.60, color: '#5D4037' },
    { id: 'perch', name: 'Окунь', min: 0.1, max: 1.1, chance: 0.28, color: '#388E3C' },
    { id: 'catfish', name: 'Сом', min: 1.1, max: 2.0, chance: 0.08, color: '#212121' },
    { id: 'shark', name: 'Акула', min: 2.0, max: 5.0, chance: 0.03, color: '#455A64' },
    { id: 'gold', name: 'Золота рибка', min: 5.0, max: 10.0, chance: 0.01, color: '#FFD700' }
];

function init() {
    // Імітація даних Telegram
    const user = { n: "Fisher_Master", a: "https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky" };
    document.getElementById('u-name').textContent = "@" + user.n;
    document.getElementById('full-u-name').textContent = "@" + user.n;
    document.getElementById('mini-avatar').style.backgroundImage = `url(${user.a})`;
    document.getElementById('large-avatar').style.backgroundImage = `url(${user.a})`;
    resize();
    render();
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);

// --- ДЕТАЛЬНЕ МАЛЮВАННЯ ОБ'ЄКТІВ (MAX CODE VOLUME) ---

function drawDetailedFish(x, y, fish, scale) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.fillStyle = fish.color;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;

    if(fish.id === 'boot') {
        ctx.beginPath();
        ctx.moveTo(-30, 20); ctx.lineTo(30, 20); ctx.lineTo(30, 0);
        ctx.lineTo(10, 0); ctx.lineTo(10, -40); ctx.lineTo(-30, -40);
        ctx.closePath(); ctx.fill(); ctx.stroke();
    } else if(fish.id === 'catfish') {
        // Тіло сома
        ctx.beginPath(); ctx.ellipse(0, 0, 60, 25, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        // Вуса
        ctx.beginPath(); ctx.moveTo(50, 5); ctx.bezierCurveTo(70, 20, 80, 0, 70, 30); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(50, -5); ctx.bezierCurveTo(70, -20, 80, 0, 70, -30); ctx.stroke();
        // Хвіст
        ctx.beginPath(); ctx.moveTo(-50, 0); ctx.lineTo(-80, -25); ctx.lineTo(-80, 25); ctx.closePath(); ctx.fill(); ctx.stroke();
    } else if(fish.id === 'shark') {
        // Акула
        ctx.beginPath(); ctx.ellipse(0, 0, 70, 25, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        // Плавник верхній
        ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(-20, -50); ctx.lineTo(-30, -20); ctx.fill(); ctx.stroke();
        // Хвіст великий
        ctx.beginPath(); ctx.moveTo(-60, 0); ctx.lineTo(-95, -35); ctx.lineTo(-95, 35); ctx.closePath(); ctx.fill(); ctx.stroke();
    } else {
        // Окунь / Золота рибка
        ctx.beginPath(); ctx.ellipse(0, 0, 50, 25, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-45, 0); ctx.lineTo(-75, -25); ctx.lineTo(-75, 25); ctx.closePath(); ctx.fill(); ctx.stroke();
        // Плавці
        ctx.beginPath(); ctx.moveTo(0, -22); ctx.quadraticCurveTo(-10, -35, -20, -22); ctx.fill(); ctx.stroke();
        if(fish.id === 'gold') { ctx.shadowBlur = 20; ctx.shadowColor = "gold"; }
    }
    
    // Око для всіх риб
    ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(35, -5, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(37, -5, 3, 0, Math.PI*2); ctx.fill();
    
    ctx.restore();
}

function render() {
    ctx.clearRect(0, 0, width, height);

    // 1. ЯСКРАВЕ НЕБО
    let skyG = ctx.createLinearGradient(0, 0, 0, height*0.5);
    skyG.addColorStop(0, '#00d2ff'); skyG.addColorStop(1, '#92fe9d');
    ctx.fillStyle = skyG; ctx.fillRect(0, 0, width, height*0.5);

    // 2. ПРОЗОРА ВОДА
    wavePos += 0.05;
    let waterG = ctx.createLinearGradient(0, height*0.5, 0, height);
    waterG.addColorStop(0, '#0052D4'); waterG.addColorStop(0.5, '#4361EE'); waterG.addColorStop(1, '#4CC9F0');
    ctx.fillStyle = waterG; ctx.fillRect(0, height*0.5, width, height*0.5);

    // Хвилі (Багато шарів для об'єму)
    ctx.lineWidth = 2;
    for(let j=0; j<8; j++) {
        ctx.strokeStyle = `rgba(255,255,255,${0.2 - j*0.02})`;
        ctx.beginPath(); ctx.moveTo(0, height*0.5 + j*45);
        for(let x=0; x<width; x+=25) {
            ctx.lineTo(x, height*0.5 + j*45 + Math.sin(x*0.01 + wavePos + j)*15);
        }
        ctx.stroke();
    }

    // 3. РЕАЛІСТИЧНИЙ МІСТОК
    ctx.fillStyle = '#3d2b1f';
    ctx.beginPath();
    ctx.moveTo(width*0.05, height); ctx.lineTo(width*0.25, height*0.7);
    ctx.lineTo(width*0.75, height*0.7); ctx.lineTo(width*0.95, height);
    ctx.fill();
    ctx.strokeStyle = '#261a12'; ctx.lineWidth = 4;
    for(let i=0; i<15; i++) {
        let y = height - (i*20);
        if(y < height*0.7) break;
        ctx.beginPath(); ctx.moveTo(width*0.05 + i*10, y); ctx.lineTo(width*0.95 - i*10, y); ctx.stroke();
    }

    // 4. ВУДКА
    rodDeg += (targetDeg - rodDeg) * 0.1;
    let rx = width * 0.85; let ry = height * 1.0;
    let tx = rx + Math.cos(rodDeg * Math.PI/180) * -500;
    let ty = ry + Math.sin(rodDeg * Math.PI/180) * -500;

    ctx.strokeStyle = '#222'; ctx.lineWidth = 12;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(tx, ty); ctx.stroke();

    // 5. ЛЕСКА ТА ПОПЛАВОК
    if(state !== 'IDLE') {
        let bx = width*0.4;
        let by = height*0.65 + Math.sin(wavePos)*10;
        if(state === 'BITING') by += Math.sin(Date.now()*0.05)*30;

        ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(bx, by); ctx.stroke();

        // Поплавок
        ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(bx, by, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'white'; ctx.fillRect(bx-3, by, 6, 18);
    }

    // 6. АНІМАЦІЯ ВИЛЬОТУ РИБИ
    if(catchAnim.active) {
        drawDetailedFish(catchAnim.x, catchAnim.y, catchAnim.fish, catchAnim.s);
        catchAnim.y -= 3;
        catchAnim.s += (1.5 - catchAnim.s) * 0.05;
    }

    requestAnimationFrame(render);
}

// --- СИСТЕМА ВІБРАЦІЇ (MULTI-DEVICE) ---
function safeVibrate(ms) {
    if ("vibrate" in navigator) {
        try { navigator.vibrate(ms); } catch(e) {}
    }
}

// --- ЛОГІКА КАЗИНО ---

mainBtn.addEventListener('click', () => {
    if(state === 'IDLE') {
        if(balance < 50) return alert("Мало ⭐️!");
        balance -= 50; updateStats();
        state = 'CASTING'; targetDeg = -5;
        mainBtn.disabled = true; msgBox.textContent = "ЗАКИНУТО!";
        setTimeout(() => {
            targetDeg = 25; state = 'WAITING';
            mainBtn.textContent = "ЧЕКАЙ...";
            setTimeout(startBite, Math.random() * 10000 + 10000);
        }, 1000);
    } else if(state === 'BITING') {
        processCatch();
    }
});

function startBite() {
    if(state !== 'WAITING') return;
    state = 'BITING';
    mainBtn.disabled = false; mainBtn.textContent = "ТЯГНИ!!!";
    msgBox.textContent = "КЛЮЄ!";
    safeVibrate([100, 50, 100, 50, 300]);

    setTimeout(() => {
        if(state === 'BITING') {
            state = 'IDLE'; msgBox.textContent = "ЗІРВАЛАСЯ...";
            resetUI();
        }
    }, 3000);
}

function processCatch() {
    state = 'WINNING';
    mainBtn.disabled = true;
    msgBox.textContent = "ТЯГНЕМО...";

    let r = Math.random();
    let fish = fishDatabase[0];
    let s = 0;
    for(let f of fishDatabase) {
        s += f.chance;
        if(r <= s) { fish = f; break; }
    }

    let m = (Math.random() * (fish.max - fish.min) + fish.min).toFixed(1);
    let win = Math.floor(50 * m);

    // Запуск анімації
    catchAnim = { active: true, x: width * 0.45, y: height * 0.5, s: 0.1, fish: fish };
    safeVibrate(200);

    setTimeout(() => {
        balance += win;
        updateStats();
        showModal(fish, m, win);
    }, 3000);
}

function showModal(fish, m, win) {
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('catch-modal').style.display = 'block';
    document.getElementById('f-name').textContent = fish.name;
    document.getElementById('f-info').textContent = `Множник: x${m}`;
    document.getElementById('f-price').textContent = `+ ${win} ⭐️`;
    document.getElementById('f-price').style.color = win > 0 ? "#28a745" : "#dc3545";
}

function resetUI() {
    state = 'IDLE'; mainBtn.disabled = false;
    mainBtn.textContent = "ЗАКИД (50 ⭐️)";
    targetDeg = 30; catchAnim.active = false;
}

function hideModals() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('catch-modal').style.display = 'none';
    resetUI();
}

function showProfile() { document.getElementById('profile-page').style.display = 'flex'; updateStats(); }
function hideProfile() { document.getElementById('profile-page').style.display = 'none'; }

function updateStats() {
    document.getElementById('balance-val').textContent = balance;
    document.getElementById('p-balance').textContent = balance;
}

function withdraw() {
    if(balance < 1000) return alert("Мінімум 1000 ⭐️ для виводу!");
    alert(`Запит на ${balance} ⭐️ надіслано! Бот скине подарунок.`);
}

init();
</script>
</body>
</html>
