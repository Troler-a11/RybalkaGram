<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra 3D Fishing Casino - Professional Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .stats { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: auto; }
        .badge { background: rgba(0, 0, 0, 0.85); color: #ffd700; padding: 14px 24px; border-radius: 20px; border: 2px solid #ffd700; font-weight: 900; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .controls { position: absolute; bottom: 50px; width: 100%; text-align: center; pointer-events: auto; }
        #action-btn { padding: 22px 65px; font-size: 26px; font-weight: 900; color: white; background: linear-gradient(45deg, #ff4e50, #f9d423); border: 4px solid #fff; border-radius: 60px; cursor: pointer; box-shadow: 0 12px 30px rgba(0,0,0,0.6); text-transform: uppercase; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #action-btn:active { transform: scale(0.92); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        #action-btn:disabled { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }
        #profile-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); display: none; z-index: 200; color: white; text-align: center; padding-top: 80px; box-sizing: border-box; }
        .fish-popup { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 160px; transition: transform 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55); pointer-events: none; z-index: 150; }
        .profit-text { font-size: 28px; color: #00ff00; margin-top: 25px; font-weight: bold; text-shadow: 0 0 10px #000; }
        .menu-btn { width: 85%; padding: 22px; margin: 12px 0; border-radius: 20px; border: none; font-size: 20px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-gold { background: #ffd700; color: #000; box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3); }
        .btn-dark { background: #333; color: #fff; border: 1px solid #555; }
        .btn-red { background: #ff4d4d; color: #fff; margin-top: 40px; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; color: gold; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

<div id="loading">ЗАВАНТАЖЕННЯ РЕАЛІСТИЧНОГО СВІТУ...</div>

<div class="ui-layer">
    <div class="stats">
        <div class="badge">💰 <span id="bal-hud">50</span> 🐟🪙</div>
        <div class="badge" onclick="toggleProfile(true)" style="cursor:pointer">👤 ПРОФІЛЬ</div>
    </div>
    <div id="fish-wrap" class="fish-popup">🐟</div>
    <div class="controls">
        <button id="action-btn" onclick="handleGame()">Закинути вудку</button>
    </div>
</div>

<div id="profile-screen">
    <h1 style="letter-spacing: 4px; color: gold;">КАБІНЕТ РИБАЛКИ</h1>
    <div style="font-size: 72px; color: white; margin: 40px 0; font-weight: 900; text-shadow: 0 0 20px rgba(255,255,255,0.2);">
        <span id="bal-prof">50</span> <span style="font-size: 24px; color: gold;">🐟🪙</span>
    </div>
    <button class="menu-btn btn-gold" onclick="tg.showAlert('Поповнення через Telegram Stars скоро буде доступне!')">ПОПОВНИТИ (1⭐ = 1🪙)</button>
    <button class="menu-btn btn-dark" onclick="tg.showAlert('Вивід монет у подарунки активовано!')">ВИВЕСТИ ПОДАРУНКИ 🎁</button>
    <button class="menu-btn btn-red" onclick="toggleProfile(false)">ПОВЕРНУТИСЯ ДО ОЗЕРА</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let balance = 50;
    let gameState = 'idle';

    // --- 3D ДВИЖОК (THREE.JS) ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 1, 100);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Світло
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
    scene.add(hemiLight);
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(10, 20, 10);
    sun.castShadow = true;
    scene.add(sun);

    // --- ОБ'ЄКТИ СВІТУ ---

    // Небо (Skybox)
    const skyGeo = new THREE.SphereGeometry(500, 32, 32);
    const skyMat = new THREE.MeshBasicMaterial({ color: 0x87ceeb, side: THREE.BackSide });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    scene.add(sky);

    // Справжня 3D Вода
    const waterGeo = new THREE.PlaneGeometry(200, 200, 80, 80);
    const waterMat = new THREE.MeshPhongMaterial({
        color: 0x0077be,
        transparent: true,
        opacity: 0.85,
        shininess: 150,
        specular: 0xffffff
    });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.rotation.x = -Math.PI / 2;
    water.receiveShadow = true;
    scene.add(water);

    // Місток (Pier)
    const bridgeGroup = new THREE.Group();
    const woodMat = new THREE.MeshStandardMaterial({ color: 0x5d4037 });
    for(let i = 0; i < 8; i++) {
        const plankGeo = new THREE.BoxGeometry(4, 0.2, 0.8);
        const plank = new THREE.Mesh(plankGeo, woodMat);
        plank.position.z = i * 0.9 - 3;
        plank.receiveShadow = true;
        bridgeGroup.add(plank);
    }
    const legGeo = new THREE.CylinderGeometry(0.15, 0.15, 5);
    const leg1 = new THREE.Mesh(legGeo, woodMat); leg1.position.set(-1.8, -2.4, 3); bridgeGroup.add(leg1);
    const leg2 = new THREE.Mesh(legGeo, woodMat); leg2.position.set(1.8, -2.4, 3); bridgeGroup.add(leg2);
    bridgeGroup.position.y = 0.5;
    scene.add(bridgeGroup);

    // Трава та дерева (Задній фон)
    const landGeo = new THREE.PlaneGeometry(200, 50);
    const landMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32 });
    const land = new THREE.Mesh(landGeo, landMat);
    land.rotation.x = -Math.PI / 2;
    land.position.z = -40;
    land.position.y = 0.1;
    scene.add(land);

    function createTree(x, z) {
        const group = new THREE.Group();
        const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 2);
        const trunk = new THREE.Mesh(trunkGeo, woodMat);
        const leaveGeo = new THREE.ConeGeometry(1.5, 4, 8);
        const leaves = new THREE.Mesh(leaveGeo, new THREE.MeshStandardMaterial({ color: 0x1b5e20 }));
        leaves.position.y = 2.5;
        group.add(trunk, leaves);
        group.position.set(x, 1, z);
        scene.add(group);
    }
    for(let i = 0; i < 15; i++) {
        createTree(Math.random() * 80 - 40, -35 - Math.random() * 10);
    }

    // Вудка
    const rodGroup = new THREE.Group();
    const handleGeo = new THREE.CylinderGeometry(0.06, 0.08, 1);
    const handle = new THREE.Mesh(handleGeo, new THREE.MeshStandardMaterial({ color: 0x222222 }));
    const tipGeo = new THREE.CylinderGeometry(0.01, 0.06, 4);
    const tip = new THREE.Mesh(tipGeo, new THREE.MeshStandardMaterial({ color: 0x444444 }));
    tip.position.y = 2.5;
    rodGroup.add(handle, tip);
    rodGroup.rotation.x = Math.PI / 3;
    rodGroup.position.set(1.2, 1, 6);
    scene.add(rodGroup);

    camera.position.set(0, 3, 10);
    camera.lookAt(0, 1, -5);

    // --- ЗВУКИ (Псевдо) ---
    function playSound(freq, duration) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        oscillator.stop(audioCtx.currentTime + duration);
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;
        
        // Хвилі води
        const vertices = water.geometry.attributes.position.array;
        for (let i = 2; i < vertices.length; i += 3) {
            vertices[i] = Math.sin(time * 1.5 + i) * 0.12 + Math.cos(time * 0.8 + i) * 0.08;
        }
        water.geometry.attributes.position.needsUpdate = true;

        // Пташки (Псевдо-анімація в небі)
        sky.rotation.y += 0.0005;

        // Кльов
        if (gameState === 'biting') {
            rodGroup.rotation.x = Math.PI / 3 + Math.sin(Date.now() * 0.03) * 0.15;
        }

        renderer.render(scene, camera);
    }
    
    setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 1500);
    animate();

    // --- ЛОГІКА КАЗИНО ---
    function updateUI() {
        document.getElementById('bal-hud').innerText = balance.toFixed(0);
        document.getElementById('bal-prof').innerText = balance.toFixed(0);
    }

    function handleGame() {
        const btn = document.getElementById('action-btn');
        const fishWrap = document.getElementById('fish-wrap');

        if (gameState === 'idle') {
            if (balance < 50) { tg.showAlert("Брат, треба підкинути монет!"); return; }
            
            balance -= 50;
            updateUI();
            gameState = 'fishing';
            btn.innerText = "ЧЕКАЄМО...";
            btn.disabled = true;
            playSound(200, 0.5); // Звук закиду

            setTimeout(() => {
                gameState = 'biting';
                btn.disabled = false;
                btn.innerText = "ПІДСІКАЙ!!!";
                btn.style.background = "linear-gradient(45deg, #ff0000, #990000)";
                tg.HapticFeedback.notificationOccurred('warning');
                // Звук кльову
                const alarm = setInterval(() => {
                    if(gameState !== 'biting') clearInterval(alarm);
                    else playSound(800, 0.1);
                }, 500);
            }, Math.random() * 20000 + 5000);

        } else if (gameState === 'biting') {
            gameState = 'result';
            btn.style.display = 'none';
            playSound(400, 0.8);

            const roll = Math.random() * 100;
            let res = { e: '🩲', m: 0 }; 
            if (roll > 99.7) res = { e: '🦈', m: 50 };
            else if (roll > 98) res = { e: '🦞', m: 15 };
            else if (roll > 92) res = { e: '🦑', m: 8 };
            else if (roll > 80) res = { e: '🐡', m: 5 };
            else if (roll > 60) res = { e: '🐠', m: 1.8 };
            else if (roll > 35) res = { e: '🐟', m: 0.6 };
            else res = { e: '🩲', m: 0 };

            const win = Math.floor(50 * res.m);
            balance += win;

            fishWrap.innerText = res.e;
            fishWrap.style.transform = "translate(-50%, -50%) scale(1)";
            
            setTimeout(() => {
                fishWrap.style.transform = "translate(-50%, -50%) scale(0)";
                btn.style.display = 'inline-block';
                btn.innerText = "Закинути вудку";
                btn.style.background = "linear-gradient(45deg, #ff4e50, #f9d423)";
                gameState = 'idle';
                updateUI();
            }, 3500);
        }
    }

    function toggleProfile(show) {
        document.getElementById('profile-screen').style.display = show ? 'block' : 'none';
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    tg.expand();
    updateUI();
</script>
</body>
</html>
