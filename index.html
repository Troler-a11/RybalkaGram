<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra 3D Fishing Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        canvas { display: block; }

        /* HUD - Інтерфейс поверх 3D */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        .stats {
            position: absolute;
            top: 20px; width: 100%;
            display: flex; justify-content: space-around;
            pointer-events: auto;
        }

        .badge {
            background: rgba(0, 0, 0, 0.8);
            color: #ffd700;
            padding: 12px 20px;
            border-radius: 15px;
            border: 2px solid #ffd700;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .controls {
            position: absolute;
            bottom: 40px; width: 100%;
            text-align: center; pointer-events: auto;
        }

        #action-btn {
            padding: 20px 50px;
            font-size: 24px;
            font-weight: 900;
            color: white;
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            border: 3px solid #fff;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        #action-btn:disabled { filter: grayscale(1); opacity: 0.7; }

        /* Профіль на весь екран */
        #profile-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.95);
            display: none; z-index: 100;
            color: white; text-align: center; padding-top: 60px;
        }

        .fish-popup {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 150px;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .profit-text { font-size: 24px; color: #00ff00; margin-top: 20px; }
    </style>
</head>
<body>

<div class="ui-layer">
    <div class="stats">
        <div class="badge">💰 <span id="bal-hud">50</span> 🐟🪙</div>
        <div class="badge" onclick="toggleProfile(true)" style="cursor:pointer">ПРОФІЛЬ 👤</div>
    </div>

    <div id="fish-wrap" class="fish-popup">🐟</div>

    <div class="controls">
        <button id="action-btn" onclick="handleGame()">Закинути вудку</button>
    </div>
</div>

<div id="profile-screen">
    <h1>КАБІНЕТ РИБАЛКИ</h1>
    <div style="font-size: 60px; color: gold; margin: 30px 0;">
        <span id="bal-prof">50</span> 🐟🪙
    </div>
    <button onclick="tg.showAlert('Оплата зірками...')" style="width: 80%; padding: 20px; margin-bottom: 10px; border-radius: 15px; background: gold; font-weight: bold;">ПОПОВНИТИ (1⭐ = 1🪙)</button>
    <button onclick="tg.showAlert('Вивід у подарунки...')" style="width: 80%; padding: 20px; border-radius: 15px; background: #333; color: white;">ВИВЕСТИ ПОДАРУНКИ 🎁</button>
    <br><br>
    <button onclick="toggleProfile(false)" style="background: red; color: white; padding: 15px 40px; border-radius: 50px;">НАЗАД ДО ГРИ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let balance = 50;
    let gameState = 'idle';

    // --- 3D ДВИЖОК (THREE.JS) ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x87ceeb, 0.02);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Світло
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(5, 10, 7);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x404040, 0.6));

    // Справжня 3D Вода (Площина з анімацією)
    const waterGeo = new THREE.PlaneGeometry(100, 100, 40, 40);
    const waterMat = new THREE.MeshPhongMaterial({
        color: 0x0077be,
        transparent: true,
        opacity: 0.8,
        shininess: 100,
        specular: 0xffffff
    });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.rotation.x = -Math.PI / 2;
    scene.add(water);

    // Вудка (Циліндрична 3D модель)
    const rodGroup = new THREE.Group();
    const rodHandleGeo = new THREE.CylinderGeometry(0.05, 0.05, 4);
    const rodHandleMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const rod = new THREE.Mesh(rodHandleGeo, rodHandleMat);
    rod.rotation.z = Math.PI / 4;
    rod.position.set(2, -1, -2);
    rodGroup.add(rod);
    scene.add(rodGroup);

    camera.position.set(0, 2, 5);

    function animate() {
        requestAnimationFrame(animate);
        
        // Хвилі
        const vertices = water.geometry.attributes.position.array;
        for (let i = 2; i < vertices.length; i += 3) {
            vertices[i] = Math.sin(Date.now() * 0.002 + i) * 0.15;
        }
        water.geometry.attributes.position.needsUpdate = true;

        // Анімація вудки при кльові
        if (gameState === 'biting') {
            rodGroup.rotation.x = Math.sin(Date.now() * 0.02) * 0.1;
        }

        renderer.render(scene, camera);
    }
    animate();

    // --- ЛОГІКА КАЗИНО ---
    function updateUI() {
        document.getElementById('bal-hud').innerText = balance.toFixed(0);
        document.getElementById('bal-prof').innerText = balance.toFixed(0);
    }

    function handleGame() {
        const btn = document.getElementById('action-btn');
        const fishWrap = document.getElementById('fish-wrap');

        if (gameState === 'idle') {
            if (balance < 50) return tg.showAlert("Немає грошей!");
            
            balance -= 50;
            updateUI();
            gameState = 'fishing';
            btn.innerText = "ЧЕКАЙ...";
            btn.disabled = true;

            // Рандом кльову 5-30 сек
            setTimeout(() => {
                gameState = 'biting';
                btn.disabled = false;
                btn.innerText = "ПІДСІКАЙ!!!";
                btn.style.background = "linear-gradient(45deg, #ff0000, #990000)";
                tg.HapticFeedback.notificationOccurred('warning');
            }, Math.random() * 25000 + 5000);

        } else if (gameState === 'biting') {
            gameState = 'result';
            btn.style.display = 'none';

            // Жорстка математика (Твій прибуток)
            const roll = Math.random() * 100;
            let res = { e: '🩲', m: 0 }; 

            if (roll > 99.5) res = { e: '🦈', m: 20 };      // 0.5%
            else if (roll > 97) res = { e: '🦞', m: 12 };   // 2.5%
            else if (roll > 90) res = { e: '🦑', m: 8 };    // 7%
            else if (roll > 80) res = { e: '🐡', m: 5 };    // 10%
            else if (roll > 60) res = { e: '🐠', m: 1.5 };  // 20%
            else if (roll > 30) res = { e: '🐟', m: 0.5 };  // 30% (мінус)
            else res = { e: '🩲', m: 0 };                   // 30% (нуль)

            const win = Math.floor(50 * res.m);
            balance += win;

            // Показуємо результат
            fishWrap.innerText = res.e;
            fishWrap.style.transform = "translate(-50%, -50%) scale(1)";
            
            setTimeout(() => {
                fishWrap.style.transform = "translate(-50%, -50%) scale(0)";
                btn.style.display = 'inline-block';
                btn.innerText = "Закинути вудку";
                btn.style.background = "linear-gradient(45deg, #ff4e50, #f9d423)";
                gameState = 'idle';
                updateUI();
            }, 3000);
        }
    }

    function toggleProfile(show) {
        document.getElementById('profile-screen').style.display = show ? 'block' : 'none';
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    tg.expand();
    updateUI();
</script>
</body>
</html>
