<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish Casino Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Реалістичний фон озера */
        #viewport {
            position: relative;
            width: 100%;
            height: 100vh;
            background: url('https://w.forfun.com/fetch/bc/bc67e51086055047f087611a14138e60.jpeg') center center;
            background-size: cover;
        }

        /* Вода поверх фону */
        .water-layer {
            position: absolute;
            bottom: 0; width: 100%; height: 50%;
            background: linear-gradient(180deg, rgba(0,50,100,0.2) 0%, rgba(0,20,40,0.6) 100%);
            z-index: 2;
        }

        /* HUD */
        .header {
            position: absolute;
            top: 15px; width: 100%;
            display: flex; justify-content: space-around;
            z-index: 100;
        }
        .ui-badge {
            background: rgba(0,0,0,0.8);
            color: gold;
            padding: 10px 15px;
            border-radius: 10px;
            border: 2px solid gold;
            font-weight: bold;
        }

        /* Вудка */
        #rod {
            position: absolute;
            bottom: -20px; right: -50px;
            width: 450px; height: 500px;
            background: url('https://i.imgur.com/GisLzO3.png') no-repeat;
            background-size: contain;
            z-index: 50;
            transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            pointer-events: none;
        }
        .bend { transform: rotate(-15deg) translateY(30px); }

        /* Поплавок */
        #float {
            position: absolute;
            left: 50%; top: 65%;
            width: 10px; height: 35px;
            background: linear-gradient(red 50%, white 50%);
            border-radius: 5px;
            display: none;
            z-index: 10;
        }
        .float-active { display: block; animation: wave 2s infinite ease-in-out; }
        .float-bite { animation: sink 0.4s infinite alternate !important; }

        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
        @keyframes sink { to { transform: translateY(40px); opacity: 0.5; } }

        /* Результат - ОДНА РИБА */
        #fish-result {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 150px;
            z-index: 200;
            transition: 0.5s;
        }

        /* Кнопки */
        .btn-main {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            padding: 20px 60px;
            background: #ff4500;
            color: white;
            border: 4px solid #fff;
            border-radius: 50px;
            font-size: 22px;
            font-weight: 900;
            z-index: 100;
        }

        /* Профіль */
        #profile {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: #fff;
            display: none; z-index: 1000;
            text-align: center; padding-top: 50px;
        }
    </style>
</head>
<body>

<div id="viewport">
    <div class="header">
        <div class="ui-badge">💰 <span id="bal-hud">50</span> 🐟🪙</div>
        <div class="ui-badge" onclick="toggleProfile(true)" style="cursor:pointer">ПРОФІЛЬ 👤</div>
    </div>

    <div class="water-layer"></div>
    <div id="float"></div>
    <div id="fish-result">🐟</div>
    <div id="rod"></div>

    <button id="action-btn" class="btn-main" onclick="processAction()">ЗАКИДАТИ</button>
</div>

<div id="profile">
    <h1>МІЙ АККАУНТ</h1>
    <h2 style="color:gold; font-size: 50px;"><span id="bal-prof">50</span> 🐟🪙</h2>
    <button onclick="alert('Stars Payment...')" style="padding: 15px; width: 80%; margin: 10px;">ПОПОВНИТИ (⭐ 1:1)</button><br>
    <button onclick="alert('Withdrawal...')" style="padding: 15px; width: 80%; margin: 10px;">ВИВЕСТИ ПОДАРУНКОМ 🎁</button><br>
    <button onclick="toggleProfile(false)" style="padding: 15px; width: 80%; margin: 40px; background: red; color: white;">НАЗАД</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let balance = 50;
    let state = 'idle'; // idle, fishing, biting, result
    
    function updateUI() {
        document.getElementById('bal-hud').innerText = balance;
        document.getElementById('bal-prof').innerText = balance;
    }

    function processAction() {
        const btn = document.getElementById('action-btn');
        const float = document.getElementById('float');
        const rod = document.getElementById('rod');
        const fishBox = document.getElementById('fish-result');

        if (state === 'idle') {
            if (balance < 50) return tg.showAlert("Мало грошей!");
            
            balance -= 50;
            updateUI();
            state = 'fishing';
            btn.innerText = "ЧЕКАЄМО...";
            btn.disabled = true;
            float.className = 'float-active';
            
            // Кльов через 5-30 сек
            setTimeout(() => {
                state = 'biting';
                float.className = 'float-active float-bite';
                rod.className = 'bend';
                btn.disabled = false;
                btn.innerText = "ПІДСІКАТИ!!!";
                tg.HapticFeedback.notificationOccurred('warning');
            }, Math.random() * 25000 + 5000);

        } else if (state === 'biting') {
            state = 'result';
            btn.style.display = 'none';
            float.className = '';
            rod.className = '';
            
            // Математика (шанси)
            const roll = Math.random() * 100;
            let res = { e: '🩲', m: 0 };
            if (roll > 99.5) res = { e: '🦈', m: 20 };
            else if (roll > 95) res = { e: '🦑', m: 11 };
            else if (roll > 85) res = { e: '🐡', m: 7 };
            else if (roll > 70) res = { e: '🐠', m: 1.8 };
            else if (roll > 40) res = { e: '🐟', m: 0.6 };
            else res = { e: '🩲', m: 0 };

            const win = Math.floor(50 * res.m);
            balance += win;

            // Показати ОДНУ рибу
            fishBox.innerText = res.e;
            fishBox.style.transform = "translate(-50%, -50%) scale(1)";
            
            setTimeout(() => {
                fishBox.style.transform = "translate(-50%, -50%) scale(0)";
                btn.style.display = 'block';
                btn.innerText = "ЗАКИДАТИ";
                state = 'idle';
                updateUI();
            }, 3000);
        }
    }

    function toggleProfile(show) {
        document.getElementById('profile').style.display = show ? 'block' : 'none';
    }

    updateUI();
    tg.expand();
</script>
</body>
</html>
