<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra 3D Fishing Casino - Professional Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .stats { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: auto; }
        .badge { background: rgba(0, 0, 0, 0.85); color: #ffd700; padding: 14px 24px; border-radius: 20px; border: 2px solid #ffd700; font-weight: 900; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); font-size: 18px; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .badge:hover { transform: scale(1.05); background: rgba(30, 30, 30, 0.9); }
        .controls { position: absolute; bottom: 50px; width: 100%; text-align: center; pointer-events: auto; }
        #action-btn { padding: 22px 65px; font-size: 26px; font-weight: 900; color: white; background: linear-gradient(45deg, #ff4e50, #f9d423); border: 4px solid #fff; border-radius: 60px; cursor: pointer; box-shadow: 0 12px 30px rgba(0,0,0,0.6); text-transform: uppercase; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #action-btn:active { transform: scale(0.92); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        #action-btn:disabled { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }
        #profile-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); display: none; z-index: 200; color: white; text-align: center; padding-top: 80px; box-sizing: border-box; overflow-y: auto; }
        .fish-popup { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 160px; transition: transform 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55); pointer-events: none; z-index: 150; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .profit-text { font-size: 42px; color: #00ff00; margin-top: 25px; font-weight: 900; text-shadow: 0 0 20px #000; display: block; }
        .menu-btn { width: 85%; padding: 22px; margin: 12px 0; border-radius: 20px; border: none; font-size: 20px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-gold { background: #ffd700; color: #000; box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3); }
        .btn-dark { background: #333; color: #fff; border: 1px solid #555; }
        .btn-red { background: #ff4d4d; color: #fff; margin-top: 40px; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: gold; font-size: 24px; font-weight: bold; }
        
        .jackpot-banner { position: absolute; top: 100px; width: 100%; text-align: center; color: #fff; font-weight: bold; font-size: 24px; text-shadow: 0 0 10px gold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .combo-counter { position: absolute; right: 20px; top: 150px; color: #ff00ff; font-size: 40px; font-weight: 900; transform: rotate(15deg); display: none; }
        .paytable { margin: 20px auto; width: 90%; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; text-align: left; font-size: 14px; }
        .pay-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="loading">
    <div style="margin-bottom: 20px; font-size: 50px;">🎰</div>
    ЗАВАНТАЖЕННЯ...
    <div id="load-progress" style="width: 200px; height: 10px; background: #333; margin-top: 20px; border-radius: 5px; overflow: hidden;">
        <div id="load-bar" style="width: 0%; height: 100%; background: gold; transition: 0.3s;"></div>
    </div>
</div>

<div class="ui-layer">
    <div class="jackpot-banner" id="jackpot-hud">JACKPOT: 50,000 🐟🪙</div>
    <div class="combo-counter" id="combo-ui">x2 COMBO!</div>
    <div class="stats">
        <div class="badge">💰 <span id="bal-hud">50</span> 🐟🪙</div>
        <div class="badge" onclick="toggleProfile(true)" style="cursor:pointer">👤 ПРОФІЛЬ</div>
    </div>
    <div id="fish-wrap" class="fish-popup">🐟<br><span id="win-amount" class="profit-text"></span></div>
    <div class="controls">
        <div style="color: white; margin-bottom: 10px; font-weight: bold; text-shadow: 1px 1px 2px #000;">СТАВКА: 50 🐟🪙</div>
        <button id="action-btn" onclick="handleGame()">Закинути вудку</button>
    </div>
</div>

<div id="profile-screen">
    <h1 style="letter-spacing: 4px; color: gold;">КАБІНЕТ РИБАЛКИ</h1>
    <div style="font-size: 72px; color: white; margin: 40px 0; font-weight: 900; text-shadow: 0 0 20px rgba(255,255,255,0.2);">
        <span id="bal-prof">50</span> <span style="font-size: 24px; color: gold;">🐟🪙</span>
    </div>
    
    <div class="paytable">
        <h3 style="text-align: center; color: gold;">ШАНСИ ТА ВИПЛАТИ</h3>
        <div class="pay-row"><span>🦈 АКУЛА (0.1%)</span> <span>x100</span></div>
        <div class="pay-row"><span>🦞 ЛОБСТЕР (1.0%)</span> <span>x20</span></div>
        <div class="pay-row"><span>🦑 КАЛЬМАР (3.0%)</span> <span>x10</span></div>
        <div class="pay-row"><span>🐡 РИБА-КУЛЯ (8.0%)</span> <span>x5</span></div>
        <div class="pay-row"><span>🐠 ТРОПІЧНА РИБА (15.0%)</span> <span>x2</span></div>
        <div class="pay-row"><span>🐟 ЗВИЧАЙНА РИБА (30.0%)</span> <span>x0.8</span></div>
        <div class="pay-row"><span>🩲 ЧЕРЕВИК / ПУСТО (42.9%)</span> <span>x0</span></div>
    </div>

    <button class="menu-btn btn-gold" onclick="tg.showAlert('Поповнення скоро!')">ПОПОВНИТИ</button>
    <button class="menu-btn btn-dark" onclick="tg.showAlert('Вивід монет активовано!')">ВИВЕСТИ 🎁</button>
    <button class="menu-btn btn-red" onclick="toggleProfile(false)">НАЗАД</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let balance = 1050; 
    let gameState = 'idle';
    let combo = 0;
    let jackpot = 50055;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x00ccff); 
    scene.fog = new THREE.Fog(0x00ccff, 10, 150);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.4);
    scene.add(hemiLight);
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(50, 100, 50);
    sun.castShadow = true;
    scene.add(sun);
    
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const birds = [];
    function createBird() {
        const birdGeo = new THREE.BufferGeometry();
        const v = new Float32Array([0,0,0, -0.3,0.1,-0.1, 0.3,0.1,-0.1]);
        birdGeo.setAttribute('position', new THREE.BufferAttribute(v, 3));
        const birdMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });
        const bird = new THREE.Mesh(birdGeo, birdMat);
        bird.position.set(Math.random()*100-50, 25 + Math.random()*15, -40 - Math.random()*60);
        scene.add(bird);
        birds.push({ mesh: bird, speed: 0.08 + Math.random()*0.1 });
    }
    for(let i=0; i<12; i++) createBird();

    const waterGeo = new THREE.PlaneGeometry(1000, 1000, 128, 128);
    const waterMat = new THREE.MeshPhongMaterial({ color: 0x0066ff, transparent: true, opacity: 0.85, shininess: 300 });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.rotation.x = -Math.PI / 2;
    water.position.y = -2; 
    scene.add(water);

    const bridgeGroup = new THREE.Group();
    const woodMat = new THREE.MeshStandardMaterial({ color: 0x4e342e });
    for(let i = 0; i < 6; i++) {
        const plank = new THREE.Mesh(new THREE.BoxGeometry(5, 0.4, 1.2), woodMat);
        plank.position.z = -i * 1.3 + 10; 
        bridgeGroup.add(plank);
    }
    bridgeGroup.position.y = -1.8;
    scene.add(bridgeGroup);

    // --- СИСТЕМА РУК (ПОВЕРНУТІ НА 30 ГРАДУСІВ) ---
    const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac, roughness: 0.7 });
    const armGeo = new THREE.CylinderGeometry(0.12, 0.15, 1.8);
    
    const leftArmGroup = new THREE.Group();
    const leftShoulder = new THREE.Mesh(new THREE.SphereGeometry(0.2), skinMat);
    leftShoulder.position.y = 0.9;
    const leftArm = new THREE.Mesh(armGeo, skinMat);
    leftArmGroup.add(leftShoulder, leftArm);
    leftArmGroup.position.set(-0.8, 0, 0); 
    leftArmGroup.rotation.set(-0.6, 0.52, 0); // Повернуто на ~30 градусів (0.52 rad)

    const rightArmGroup = new THREE.Group();
    const rightShoulder = new THREE.Mesh(new THREE.SphereGeometry(0.2), skinMat);
    rightShoulder.position.y = 0.9;
    const rightArm = new THREE.Mesh(armGeo, skinMat);
    rightArmGroup.add(rightShoulder, rightArm);
    rightArmGroup.position.set(0.8, 0, 0);
    rightArmGroup.rotation.set(-0.6, -0.52, 0); // Повернуто на ~30 градусів всередину

    const palmGeo = new THREE.BoxGeometry(0.25, 0.12, 0.3);
    const leftPalm = new THREE.Mesh(palmGeo, skinMat);
    leftPalm.position.set(0, -0.95, 0.1);
    leftArmGroup.add(leftPalm);

    const rightPalm = new THREE.Mesh(palmGeo, skinMat);
    rightPalm.position.set(0, -0.95, 0.1);
    rightArmGroup.add(rightPalm);

    const fishermanBody = new THREE.Group();
    fishermanBody.add(leftArmGroup, rightArmGroup);
    fishermanBody.position.set(0, -1.0, 5.0); 
    scene.add(fishermanBody);

    // --- ОДНА ЦЕНТРАЛЬНА ВУДКА ---
    const rodGroup = new THREE.Group();
    const rodBodyGeo = new THREE.CylinderGeometry(0.02, 0.06, 7);
    const rodBodyMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8 });
    const rodBody = new THREE.Mesh(rodBodyGeo, rodBodyMat);
    rodBody.position.y = 3.2; 
    rodGroup.add(rodBody);
    
    const reelGroup = new THREE.Group();
    const reelSideGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.05);
    const reelMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.6 });
    const reelL = new THREE.Mesh(reelSideGeo, reelMat);
    reelL.rotation.z = Math.PI/2;
    reelL.position.set(0.2, 1.3, 0);
    const reelR = reelL.clone();
    reelR.position.set(-0.2, 1.3, 0);
    const reelBody = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.4), reelMat);
    reelBody.rotation.z = Math.PI/2;
    reelBody.position.y = 1.3;
    reelGroup.add(reelL, reelR, reelBody);
    rodGroup.add(reelGroup);

    const gripGeo = new THREE.CylinderGeometry(0.08, 0.08, 1.5);
    const gripMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 1.0 });
    const grip = new THREE.Mesh(gripGeo, gripMat);
    grip.position.y = 0.5;
    rodGroup.add(grip);

    const finalRod = rodGroup;
    finalRod.rotation.x = -Math.PI / 3.5; 
    finalRod.position.set(0, -0.6, 5.2);
    scene.add(finalRod);

    const linePoints = [new THREE.Vector3(0, 6.5, 0), new THREE.Vector3(0, -2, -10)];
    const lineGeo = new THREE.BufferGeometry().setFromPoints(linePoints);
    const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
    const line = new THREE.Line(lineGeo, lineMat);
    finalRod.add(line); 

    const floatGeo = new THREE.SphereGeometry(0.12, 8, 8);
    const floatMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
    const float = new THREE.Mesh(floatGeo, floatMat);
    float.position.set(0, -1.9, -6);
    scene.add(float);

    camera.position.set(0, 1.5, 9);
    camera.lookAt(0, 0, -5);

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;
        
        const verts = water.geometry.attributes.position.array;
        for (let i = 2; i < verts.length; i += 3) {
            verts[i] = Math.sin(time * 1.5 + i) * 0.1;
        }
        water.geometry.attributes.position.needsUpdate = true;

        float.position.y = -1.9 + Math.sin(time * 2.5) * 0.06;
        
        birds.forEach(b => {
            b.mesh.position.x += b.speed;
            if(b.mesh.position.x > 70) b.mesh.position.x = -70;
        });

        const idleSway = Math.sin(time) * 0.02;
        finalRod.position.y = -0.6 + idleSway;
        fishermanBody.position.y = -1.0 + idleSway;

        if (gameState === 'biting') {
            float.position.y -= 0.5;
            finalRod.rotation.x = -Math.PI / 3.5 + Math.sin(time * 30) * 0.07;
            fishermanBody.position.y += Math.sin(time * 30) * 0.03; 
        }

        renderer.render(scene, camera);
    }
    
    setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 1200);
    animate();

    function updateUI() {
        document.getElementById('bal-hud').innerText = balance.toLocaleString();
        document.getElementById('bal-prof').innerText = balance.toLocaleString();
        jackpot += Math.floor(Math.random()*3);
        document.getElementById('jackpot-hud').innerText = `JACKPOT: ${jackpot.toLocaleString()} 🐟🪙`;
    }

    function handleGame() {
        const btn = document.getElementById('action-btn');
        const fishWrap = document.getElementById('fish-wrap');

        if (gameState === 'idle') {
            if (balance < 50) return tg.showAlert("Мало монет!");
            balance -= 50; updateUI();
            gameState = 'fishing';
            btn.innerText = "ОЧІКУВАННЯ..."; btn.disabled = true;
            btn.style.filter = "hue-rotate(180deg)";

            setTimeout(() => {
                if(gameState !== 'fishing') return;
                gameState = 'biting';
                btn.disabled = false; btn.innerText = "ПІДСІКАЙ!";
                btn.style.background = "linear-gradient(45deg, #ff0000, #990000)";
                btn.style.filter = "none";
                tg.HapticFeedback.notificationOccurred('warning');
            }, Math.random() * 8000 + 4000);

        } else if (gameState === 'biting') {
            gameState = 'result'; 
            btn.style.display = 'none';

            const roll = Math.random() * 100;
            let res = { e: '🩲', m: 0, n: 'ЧЕРЕВИК' }; 

            if (roll > 99.9) res = { e: '🦈', m: 100, n: 'АКУЛА!' };
            else if (roll > 98.9) res = { e: '🦞', m: 20, n: 'ЛОБСТЕР' };
            else if (roll > 95.9) res = { e: '🦑', m: 10, n: 'КАЛЬМАР' };
            else if (roll > 87.9) res = { e: '🐡', m: 5, n: 'РИБА-КУЛЯ' };
            else if (roll > 72.9) res = { e: '🐠', m: 2, n: 'ТРОПІЧНА' };
            else if (roll > 42.9) res = { e: '🐟', m: 0.8, n: 'РИБА' };

            if(res.m > 0) combo++; else combo = 0;
            if(combo > 1) { document.getElementById('combo-ui').innerText = `x${combo} COMBO!`; document.getElementById('combo-ui').style.display='block'; }
            else { document.getElementById('combo-ui').style.display='none'; }

            let win = Math.floor(50 * res.m * (1 + combo*0.1));
            balance += win;
            
            fishWrap.innerHTML = `${res.e}<br><span class="profit-text">+${win}</span>`;
            fishWrap.style.transform = "translate(-50%, -50%) scale(1)";
            
            tg.HapticFeedback.impactOccurred('heavy');

            setTimeout(() => {
                fishWrap.style.transform = "translate(-50%, -50%) scale(0)";
                btn.style.display = 'inline-block';
                btn.innerText = "Закинути вудку";
                btn.style.background = "linear-gradient(45deg, #ff4e50, #f9d423)";
                gameState = 'idle'; 
                updateUI();
            }, 3000);
        }
    }

    function toggleProfile(show) {
        document.getElementById('profile-screen').style.display = show ? 'block' : 'none';
        if(show) tg.HapticFeedback.impactOccurred('medium');
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    tg.expand();
    updateUI();
</script>
</body>
</html>
