<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fishing Casino 4D</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0e1621; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        canvas { display: block; filter: contrast(1.1) saturate(1.2); }
        
        /* UI блоки */
        #game-ui, #profile-page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; transition: 0.3s; }
        #profile-page { background: var(--bg); pointer-events: auto; display: none; flex-direction: column; align-items: center; padding-top: 40px; }
        .active { display: flex !important; }

        .pointer { pointer-events: auto; cursor: pointer; }

        /* Профіль компоненти */
        .user-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 10px; background: #2b5278; }
        .user-name { color: white; font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .balance-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; width: 80%; text-align: center; margin: 20px 0; border: 1px solid rgba(255,215,0,0.3); }
        .btn-action { width: 80%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; color: white; cursor: pointer; }
        .btn-deposit { background: #0088cc; }
        .btn-withdraw { background: #333; color: #aaa; }
        .btn-back { background: transparent; border: 1px solid #555; margin-top: 20px; }

        /* Кнопка закиду */
        .main-btn { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(#ff4e50, #f9d423);
            border: 8px solid rgba(255,255,255,0.2); color: white; font-size: 28px; font-weight: 900;
            box-shadow: 0 0 30px rgba(255,78,80,0.5); pointer-events: auto; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .main-btn:disabled { filter: grayscale(1); opacity: 0.5; }

        /* Анімація риби при лові */
        #fish-reveal {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            z-index: 100; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center; pointer-events: none;
        }
        .show-fish { transform: translate(-50%, -50%) scale(1.5) !important; }
        .fish-img { width: 100px; filter: drop-shadow(0 0 10px white); }

        .hud-top { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); color: var(--gold); padding: 10px 20px; border-radius: 30px; pointer-events: auto; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="game-ui">
    <div class="hud-top pointer" onclick="openProfile()">
        👤 <span id="header-balance">50</span> ⭐️
    </div>
    <div id="msg-box" style="position:absolute; top: 120px; width:100%; text-align:center; color:white; font-size:18px;"></div>
    <button id="cast-btn" class="main-btn" onclick="handleAction()">ЗАКИД</button>
</div>

<div id="fish-reveal">
    <div id="fish-icon" style="font-size: 60px;">🐟</div>
    <div id="fish-name-tag" style="color: white; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; margin-top: 10px;"></div>
</div>

<div id="profile-page">
    <img id="user-photo" class="user-avatar" src="" alt="">
    <div id="user-name" class="user-name">Гравець</div>
    <div style="color: #888; font-size: 14px;">ID: <span id="user-id">000000</span></div>

    <div class="balance-card">
        <div style="color: var(--gold); font-size: 14px; text-transform: uppercase;">Твій Баланс</div>
        <div style="color: white; font-size: 36px; font-weight: 900;"><span id="p-balance">50</span> ⭐️</div>
    </div>

    <button class="btn-action btn-deposit" onclick="buyStars()">ПОПОВНИТИ (⭐️ ТГ)</button>
    <button class="btn-action btn-withdraw" onclick="withdrawReq()">ВИВЕСТИ (ВІД 1000)</button>
    
    <button class="btn-action btn-back" onclick="closeProfile()">НАЗАД ДО ОЗЕРА</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const castBtn = document.getElementById('cast-btn');
    const fishReveal = document.getElementById('fish-reveal');
    
    let balance = 50;
    let state = 'IDLE';
    let width, height;

    // Дані користувача з ТГ
    if (tg.initDataUnsafe.user) {
        document.getElementById('user-name').textContent = tg.initDataUnsafe.user.first_name;
        document.getElementById('user-id').textContent = tg.initDataUnsafe.user.id;
        if (tg.initDataUnsafe.user.photo_url) {
            document.getElementById('user-photo').src = tg.initDataUnsafe.user.photo_url;
        }
    }

    // КАЗИНО МАТЕМАТИКА (Шанси сумарно 1.0)
    // RTP налаштовано так, щоб "Черевик" і "Окунь" (мінусові/дрібні) випадали найчастіше
    const fishDex = [
        { id: 'boot', name: 'Старий черевик', icon: '👞', mult: [0, 0], chance: 0.40 },     // 40% - Повний мінус
        { id: 'perch', name: 'Окунь', icon: '🐟', mult: [0.1, 1.1], chance: 0.35 },        // 35% - Майже завжди мінус або вихід в нуль
        { id: 'catfish', name: 'Сом', icon: '🐡', mult: [1.1, 2.0], chance: 0.18 },       // 18% - Невеликий плюс
        { id: 'shark', name: 'Акула', icon: '🦈', mult: [2.0, 5.0], chance: 0.06 },        // 6% - Рідкісний виграш
        { id: 'gold', name: 'Золота Рибка', icon: '✨', mult: [5.0, 10.0], chance: 0.01 } // 1% - Джекпот
    ];

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Рендер фону (спрощений для швидкості)
    function draw() {
        ctx.fillStyle = '#00b4db'; ctx.fillRect(0,0,width,height*0.5); // Небо
        ctx.fillStyle = '#005c97'; ctx.fillRect(0,height*0.5,width,height*0.5); // Вода
        // Місток
        ctx.fillStyle = '#3e2723';
        ctx.beginPath(); ctx.moveTo(width*0.2, height); ctx.lineTo(width*0.4, height*0.7);
        ctx.lineTo(width*0.6, height*0.7); ctx.lineTo(width*0.8, height); ctx.fill();
        requestAnimationFrame(draw);
    }
    draw();

    function handleAction() {
        if (state === 'IDLE') {
            if (balance < 50) { tg.showAlert("Недостатньо зірочок!"); return; }
            startFishing();
        } else if (state === 'BITING') {
            catchFish();
        }
    }

    function startFishing() {
        balance -= 50;
        updateUI();
        state = 'CASTING';
        castBtn.disabled = true;
        document.getElementById('msg-box').textContent = "Закидаємо вудку... (50 ⭐️)";

        setTimeout(() => {
            state = 'WAITING';
            castBtn.textContent = "WAIT";
            // Рандомний час очікування
            setTimeout(triggerBite, Math.random() * 15000 + 5000);
        }, 1500);
    }

    function triggerBite() {
        if (state !== 'WAITING') return;
        state = 'BITING';
        castBtn.disabled = false;
        castBtn.textContent = "ТЯГНИ!";
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        // 3 сек на реакцію
        setTimeout(() => { if (state === 'BITING') missFish(); }, 3000);
    }

    function catchFish() {
        state = 'RESULT';
        castBtn.disabled = true;
        
        // Математичний розрахунок улову
        const roll = Math.random();
        let cumulative = 0;
        let selectedFish = fishDex[0];
        
        for (let f of fishDex) {
            cumulative += f.chance;
            if (roll <= cumulative) {
                selectedFish = f;
                break;
            }
        }

        const multiplier = (Math.random() * (selectedFish.mult[1] - selectedFish.mult[0]) + selectedFish.mult[0]).toFixed(1);
        const winAmount = Math.floor(50 * multiplier);
        balance += winAmount;

        // Анімація показу риби
        document.getElementById('fish-icon').textContent = selectedFish.icon;
        document.getElementById('fish-name-tag').textContent = `${selectedFish.name} x${multiplier}`;
        fishReveal.classList.add('show-fish');

        setTimeout(() => {
            fishReveal.classList.remove('show-fish');
            updateUI();
            resetGame();
            
            // Показуємо модалку через 3 сек
            setTimeout(() => {
                tg.showConfirm(`Ти зловив: ${selectedFish.name}!\nВиграш: ${winAmount} ⭐️`);
            }, 500);
        }, 3000);
    }

    function missFish() {
        state = 'IDLE';
        resetGame();
        tg.showAlert("Риба зірвалася! Спробуй ще.");
    }

    function resetGame() {
        state = 'IDLE';
        castBtn.disabled = false;
        castBtn.textContent = "ЗАКИД";
        document.getElementById('msg-box').textContent = "";
    }

    function updateUI() {
        document.getElementById('header-balance').textContent = balance;
        document.getElementById('p-balance').textContent = balance;
    }

    // Навігація
    function openProfile() { document.getElementById('profile-page').classList.add('active'); }
    function closeProfile() { document.getElementById('profile-page').classList.remove('active'); }

    function buyStars() {
        tg.showAlert("Система оплати: Бот виставить рахунок на зірочки 1:1.");
        // Тут логіка tg.openInvoice()
    }

    function withdrawReq() {
        if (balance < 1000) {
            tg.showAlert("Мінімальна сума для виводу — 1000 ⭐️");
        } else {
            tg.showConfirm(`Вивести ${balance} ⭐️? Подарунок буде надіслано ботом протягом 24 годин.`, (ok) => {
                if(ok) {
                    balance = 0;
                    updateUI();
                    tg.showAlert("Запит прийнято!");
                }
            });
        }
    }
</script>
</body>
</html>
