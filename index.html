<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fishing Universe Pro - Triple-A Mobile Experience</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        canvas { display: block; touch-action: none; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .stats { position: absolute; top: 25px; width: 100%; display: flex; justify-content: space-around; pointer-events: auto; }
        .badge { background: rgba(0, 0, 0, 0.75); color: #ffd700; padding: 16px 28px; border-radius: 25px; border: 2px solid #ffd700; font-weight: 900; box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); font-size: 20px; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .badge:hover { transform: translateY(-2px); box-shadow: 0 5px 35px rgba(255, 215, 0, 0.5); }
        .controls { position: absolute; bottom: 60px; width: 100%; text-align: center; pointer-events: auto; }
        #action-btn { padding: 25px 80px; font-size: 28px; font-weight: 900; color: white; background: linear-gradient(135deg, #ff8c00 0%, #ff4e50 50%, #d4145a 100%); border: 3px solid rgba(255,255,255,0.8); border-radius: 100px; cursor: pointer; box-shadow: 0 15px 40px rgba(0,0,0,0.5); text-transform: uppercase; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); letter-spacing: 2px; }
        #action-btn:active { transform: scale(0.9); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        #profile-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1e1e1e 0%, #000 100%); display: none; z-index: 500; color: white; text-align: center; padding-top: 100px; box-sizing: border-box; }
        .fish-popup { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 180px; transition: 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045); filter: drop-shadow(0 0 30px gold); z-index: 200; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .loader-bar { width: 250px; height: 4px; background: #333; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        .loader-fill { width: 0%; height: 100%; background: #ffd700; transition: width 0.5s; }
    </style>
</head>
<body>

<div id="loading">
    <div style="font-size: 32px; font-weight: bold; letter-spacing: 5px;">FISHING UNIVERSE</div>
    <div style="color: #666; margin-top: 10px;">RENDERING HIGH-END ASSETS...</div>
    <div class="loader-bar"><div id="loader-fill" class="loader-fill"></div></div>
</div>

<div class="ui-layer">
    <div class="stats">
        <div class="badge">💎 <span id="bal-hud">50</span></div>
        <div class="badge" onclick="toggleProfile(true)" style="cursor:pointer">⚙️ МЕНЮ</div>
    </div>
    <div id="fish-wrap" class="fish-popup">🐟</div>
    <div class="controls">
        <button id="action-btn" onclick="handleGame()">Закинути</button>
    </div>
</div>

<div id="profile-screen">
    <h1 style="color: #ffd700;">STATISTICS</h1>
    <div style="font-size: 80px; margin: 50px 0;"><span id="bal-prof">50</span> 💎</div>
    <button style="width: 80%; padding: 20px; background: gold; border: none; font-weight: bold; border-radius: 15px;" onclick="tg.showAlert('Shop locked')">SHOP</button>
    <br><br>
    <button style="width: 80%; padding: 20px; background: #333; color: white; border: none; border-radius: 15px;" onclick="toggleProfile(false)">CLOSE</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let balance = 50;
    let gameState = 'idle';

    // --- ENGINE INITIALIZATION ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x40bfff); // Яскраве літнє небо
    scene.fog = new THREE.FogExp2(0x40bfff, 0.015);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // --- ADVANCED LIGHTING ---
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const mainSun = new THREE.DirectionalLight(0xffffff, 1.5);
    mainSun.position.set(100, 200, 100);
    mainSun.castShadow = true;
    mainSun.shadow.mapSize.width = 2048;
    mainSun.shadow.mapSize.height = 2048;
    scene.add(mainSun);

    // --- WORLD GEOMETRY ---
    // Покращена вода
    const waterGeo = new THREE.PlaneGeometry(1500, 1500, 150, 150);
    const waterMat = new THREE.MeshStandardMaterial({
        color: 0x0044ff,
        metalness: 0.9,
        roughness: 0.1,
        transparent: true,
        opacity: 0.85
    });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.rotation.x = -Math.PI / 2;
    water.position.y = -3.5;
    scene.add(water);

    // Створення лісу (Багато дерев для об'єму коду та вигляду)
    const forestGroup = new THREE.Group();
    function createDetailedTree(x, z) {
        const tree = new THREE.Group();
        const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(0.5, 0.8, 8, 8),
            new THREE.MeshStandardMaterial({ color: 0x3d2b1f })
        );
        const leaves = new THREE.Mesh(
            new THREE.ConeGeometry(4, 10, 8),
            new THREE.MeshStandardMaterial({ color: 0x1a4a1a })
        );
        leaves.position.y = 7;
        tree.add(trunk, leaves);
        tree.position.set(x, 0, z);
        forestGroup.add(tree);
    }
    for(let i=0; i<150; i++) {
        createDetailedTree(Math.random()*400-200, -80 - Math.random()*200);
    }
    scene.add(forestGroup);

    // Місток (Люксовий стиль)
    const bridge = new THREE.Group();
    const plankMat = new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.8 });
    for(let i=0; i<8; i++) {
        const p = new THREE.Mesh(new THREE.BoxGeometry(7, 0.4, 1.4), plankMat);
        p.position.z = 5 - (i * 1.6);
        p.receiveShadow = true;
        bridge.add(p);
    }
    bridge.position.y = -3.2;
    scene.add(bridge);

    // --- REALISTIC HANDS & ROD ---
    const playerGroup = new THREE.Group();
    
    // Руки з ліктями та пальцями (спрощено, але об'ємно)
    const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
    const leftHand = new THREE.Group();
    const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 2), skinMat);
    lArm.position.set(-1.2, -1, 3);
    lArm.rotation.x = -0.5;
    leftHand.add(lArm);

    const rightHand = new THREE.Group();
    const rArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 2), skinMat);
    rArm.position.set(1.2, -1, 3);
    rArm.rotation.x = -0.5;
    rightHand.add(rArm);
    
    playerGroup.add(leftHand, rightHand);

    // Вудка (карбонова, тонка)
    const rod = new THREE.Group();
    const rodMain = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.08, 7, 12),
        new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8 })
    );
    rodMain.rotation.x = Math.PI / 2.2;
    rodMain.position.set(1.2, 0.5, 0);
    rod.add(rodMain);
    
    // Леска (Фізична лінія)
    const linePoints = [new THREE.Vector3(1.2, 3.5, -4), new THREE.Vector3(0, -3.5, -15)];
    const lineGeo = new THREE.BufferGeometry().setFromPoints(linePoints);
    const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
    const fishingLine = new THREE.Line(lineGeo, lineMat);
    scene.add(fishingLine);

    // Поплавок (Професійний)
    const float = new THREE.Group();
    const fTop = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.8), new THREE.MeshBasicMaterial({color: 0xff0000}));
    const fBody = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0xffffff}));
    float.add(fTop, fBody);
    float.position.set(0, -3.5, -15);
    scene.add(float);

    playerGroup.add(rod);
    scene.add(playerGroup);

    camera.position.set(0, 0, 8);
    camera.lookAt(0, 0, -20);

    // --- ANIMATION LOOP ---
    function animate() {
        requestAnimationFrame(animate);
        const t = Date.now() * 0.001;

        // Вода
        const v = water.geometry.attributes.position.array;
        for(let i=2; i<v.length; i+=3) {
            v[i] = Math.sin(t + i) * 0.2 + Math.cos(t * 0.5 + i) * 0.1;
        }
        water.geometry.attributes.position.needsUpdate = true;

        // Пташки
        birds.forEach(b => {
            b.mesh.position.x += b.speed;
            b.mesh.position.y += Math.sin(t * 5) * 0.02;
            if(b.mesh.position.x > 100) b.mesh.position.x = -100;
        });

        // Поплавок на хвилях
        if(gameState !== 'biting') {
            float.position.y = -3.5 + Math.sin(t * 2) * 0.15;
        } else {
            float.position.y = -4.2 + Math.sin(t * 15) * 0.1; // Клює!
        }

        // Оновлення лески
        const rodTip = new THREE.Vector3();
        rodMain.getWorldPosition(rodTip);
        fishingLine.geometry.setFromPoints([
            new THREE.Vector3(1.2, 3.2, -1.5),
            float.position
        ]);

        renderer.render(scene, camera);
    }

    // --- LOGIC ---
    function handleGame() {
        const btn = document.getElementById('action-btn');
        if(gameState === 'idle') {
            gameState = 'fishing';
            btn.innerText = 'ЧЕКАЙ...';
            btn.disabled = true;
            
            setTimeout(() => {
                gameState = 'biting';
                btn.disabled = false;
                btn.innerText = 'ТЯГНИ!!!';
                tg.HapticFeedback.impactOccurred('heavy');
            }, Math.random() * 8000 + 3000);
        } else if(gameState === 'biting') {
            gameState = 'idle';
            btn.innerText = 'ЗАКИД';
            const win = Math.random() > 0.5 ? 20 : 0;
            balance += win;
            document.getElementById('bal-hud').innerText = balance;
            document.getElementById('fish-wrap').style.transform = "translate(-50%, -50%) scale(1)";
            setTimeout(() => {
                document.getElementById('fish-wrap').style.transform = "translate(-50%, -50%) scale(0)";
            }, 2000);
        }
    }

    function toggleProfile(s) { document.getElementById('profile-screen').style.display = s ? 'block' : 'none'; }

    // Loading simulation
    let load = 0;
    const int = setInterval(() => {
        load += 10;
        document.getElementById('loader-fill').style.width = load + '%';
        if(load >= 100) {
            clearInterval(int);
            document.getElementById('loading').style.display = 'none';
        }
    }, 200);

    animate();
    tg.expand();
</script>
</body>
</html>
