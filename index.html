<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fishing 4D Pro - Casino Edition</title>
    <style>
        /* Зберігаємо твій стиль і додаємо новий */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: gold; padding: 15px; border-radius: 12px; border: 2px solid gold; pointer-events: auto; cursor: pointer; }
        
        .btn-main { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 20px 60px; font-size: 24px; font-weight: bold; color: white;
            background: linear-gradient(#4CAF50, #2E7D32); border: none; border-radius: 50px;
            box-shadow: 0 8px 0 #1B5E20, 0 15px 20px rgba(0,0,0,0.5); pointer-events: auto; cursor: pointer;
        }
        .btn-main:active:not(:disabled) { transform: translateX(-50%) translateY(4px); box-shadow: 0 4px 0 #1B5E20; }
        .btn-main:disabled { background: #555; box-shadow: 0 8px 0 #333; opacity: 0.6; }

        /* Новий стиль профілю як окремої сторінки */
        .full-page-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            z-index: 1000; display: none; pointer-events: auto; color: white;
            flex-direction: column; align-items: center; padding-top: 50px;
        }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid gold; margin-bottom: 10px; background: #333; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; max-width: 400px; margin-top: 20px; }
        .stat-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #444; }
        
        .btn-action-group { width: 90%; max-width: 400px; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn-tg { padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-deposit { background: #0088cc; color: white; }
        .btn-withdraw { background: #ff9800; color: white; }
        .btn-upgrade { background: #673ab7; color: white; }
        
        #catch-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 30px; border-radius: 20px; width: 80%; max-width: 400px;
            text-align: center; display: none; pointer-events: auto; z-index: 1100;
        }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 900; }
        
        .close-btn { margin-top: 30px; color: #aaa; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div class="hud" onclick="showProfile()">
        <div style="display:flex; align-items:center;">
            <div id="mini-avatar" style="width:30px; height:30px; border-radius:50%; background:#444; margin-right:10px; border:1px solid gold;"></div>
            <div>
                <span id="user-name-hud">Гравець</span><br>
                <span id="balance-val" style="font-size:18px;">50</span> ⭐️
            </div>
        </div>
    </div>
    <div id="msg-box" style="position:absolute; top: 110px; width:100%; text-align:center; color:white; font-size:20px; text-shadow:2px 2px 4px #000; font-weight:bold;"></div>
    <button id="main-action" class="btn-main">ЗАКИД (50 ⭐️)</button>
</div>

<div id="profile-page" class="full-page-modal">
    <div class="profile-avatar" id="large-avatar"></div>
    <h2 id="user-name-full">@telegram_user</h2>
    <p style="color: gold; font-size: 24px;"><span id="p-balance">50</span> ⭐️</p>
    
    <div class="stats-grid">
        <div class="stat-card">
            <small>Вудка</small><br>
            <b id="rod-level-display">Lvl 1</b>
        </div>
        <div class="stat-card">
            <small>Множник удачі</small><br>
            <b id="luck-display">+0%</b>
        </div>
    </div>

    <div class="btn-action-group">
        <button class="btn-tg btn-deposit" onclick="depositStars()">ПОПОВНИТИ (⭐️ ТГ)</button>
        <button class="btn-tg btn-withdraw" onclick="withdrawStars()">ВИВЕСТИ (ВІД 1000)</button>
        <button class="btn-tg btn-upgrade" id="upgrade-btn" onclick="upgradeRod()">ПРОКАЧАТИ ВУДКУ (<span id="upgrade-cost">200</span> ⭐️)</button>
    </div>
    
    <div class="close-btn" onclick="hideProfile()">ПОВЕРНУТИСЬ ДО РИБАЛКИ</div>
</div>

<div id="overlay" class="overlay"></div>

<div id="catch-modal">
    <h2 id="fish-name" style="margin-top:0;">Золота рибка!</h2>
    <p id="fish-details"></p>
    <h3 id="fish-price" style="font-size:28px; color: #2E7D32;"></h3>
    <button class="btn-main" style="position:static; transform:none; width:100%; padding:15px;" onclick="hideModals()">ЗАБРАТИ УЛОВ</button>
</div>

<script>
/**
 * FISHING 4D ENGINE v3.0 - CASINO LOGIC
 * Спеціально для Telegram Stars
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mainBtn = document.getElementById('main-action');
const msgBox = document.getElementById('msg-box');

// Game State & Telegram Data
let balance = 50;
let rodLevel = 1;
let state = 'IDLE'; 
let width, height;
let particles = [];
let waveOffset = 0;
let rodAngle = 30;
let targetRodAngle = 30;

// Анімація риби на гачку
let caughtFishAnim = { active: false, x: 0, y: 0, scale: 0, opacity: 0, type: null };

// Fish Casino Data (Множники та шанси)
const fishDex = [
    { id: 'boot', name: 'Старий черевик', minX: 0, maxX: 0, chance: 0.50, color: '#4d342e' },
    { id: 'perch', name: 'Окунь', minX: 0.1, maxX: 1.1, chance: 0.35, color: '#4a5d23' },
    { id: 'catfish', name: 'Сом', minX: 1.1, maxX: 2.0, chance: 0.10, color: '#222' },
    { id: 'shark', name: 'Акула', minX: 2.0, maxX: 5.0, chance: 0.04, color: '#546e7a' },
    { id: 'gold', name: 'Золота рибка', minX: 5.0, maxX: 10.0, chance: 0.01, color: '#ffb300' }
];

// Імітація Telegram Web App API
const tgUser = {
    name: "Рибалка_ТГ",
    avatar: "https://via.placeholder.com/100/gold/white?text=TG"
};

function initUser() {
    document.getElementById('user-name-hud').textContent = tgUser.name;
    document.getElementById('user-name-full').textContent = "@" + tgUser.name;
    document.getElementById('mini-avatar').style.backgroundImage = `url(${tgUser.avatar})`;
    document.getElementById('large-avatar').style.backgroundImage = `url(${tgUser.avatar})`;
    document.getElementById('large-avatar').style.backgroundSize = "cover";
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- РЕНДЕР (ЗБЕРЕЖЕНО ТА ДОПРАЦЬОВАНО) ---
function render() {
    ctx.clearRect(0, 0, width, height);

    // 1. Небо
    let skyGrad = ctx.createLinearGradient(0, 0, 0, height*0.5);
    skyGrad.addColorStop(0, '#00b4db'); skyGrad.addColorStop(1, '#6dd5ed');
    ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, width, height*0.5);

    // 2. Вода
    waveOffset += 0.05;
    let waterGrad = ctx.createLinearGradient(0, height*0.5, 0, height);
    waterGrad.addColorStop(0, '#005c97'); waterGrad.addColorStop(1, '#363795');
    ctx.fillStyle = waterGrad; ctx.fillRect(0, height*0.5, width, height*0.5);

    // Хвилі
    for(let i=0; i<5; i++) {
        ctx.strokeStyle = `rgba(255,255,255,${0.1 - i*0.02})`;
        ctx.beginPath(); ctx.moveTo(0, height*0.55 + i*40);
        for(let x=0; x<width; x+=20) {
            ctx.lineTo(x, height*0.55 + i*40 + Math.sin(x*0.01 + waveOffset + i)*10);
        }
        ctx.stroke();
    }

    // 3. Місток
    ctx.fillStyle = '#4e342e';
    ctx.beginPath();
    ctx.moveTo(width*0.1, height); ctx.lineTo(width*0.3, height*0.7);
    ctx.lineTo(width*0.7, height*0.7); ctx.lineTo(width*0.9, height);
    ctx.fill();

    // 4. Вудка
    rodAngle += (targetRodAngle - rodAngle) * 0.1;
    let rodX = width * 0.8;
    let rodY = height * 0.95;
    let tipX = rodX + Math.cos(rodAngle * Math.PI/180) * -400;
    let tipY = rodY + Math.sin(rodAngle * Math.PI/180) * -400;

    ctx.strokeStyle = '#222'; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(rodX, rodY); ctx.lineTo(tipX, tipY); ctx.stroke();

    // 5. Поплавок
    if(state !== 'IDLE') {
        let bX = width*0.4;
        let bY = height*0.65 + Math.sin(waveOffset)*5;
        if(state === 'BITING') bY += Math.sin(Date.now()*0.03)*20;

        ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(tipX, tipY); ctx.lineTo(bX, bY); ctx.stroke();

        ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(bX, bY, 10, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'white'; ctx.fillRect(bX-2, bY, 4, 12);
    }

    // 6. АНІМАЦІЯ РИБИ НА ГАЧКУ (НОВЕ)
    if(caughtFishAnim.active) {
        ctx.save();
        ctx.translate(caughtFishAnim.x, caughtFishAnim.y);
        ctx.scale(caughtFishAnim.scale, caughtFishAnim.scale);
        ctx.globalAlpha = caughtFishAnim.opacity;
        
        // Малюємо "рибу" (спрощено)
        ctx.fillStyle = caughtFishAnim.type.color;
        ctx.beginPath();
        ctx.ellipse(0, 0, 40, 20, 0, 0, Math.PI*2);
        ctx.fill();
        // Хвіст
        ctx.beginPath();
        ctx.moveTo(-35, 0); ctx.lineTo(-55, -20); ctx.lineTo(-55, 20); ctx.closePath();
        ctx.fill();
        // Око
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(20, -5, 5, 0, Math.PI*2); ctx.fill();
        
        ctx.restore();
        
        // Ефект підйому
        caughtFishAnim.y -= 2;
        caughtFishAnim.scale += (1 - caughtFishAnim.scale) * 0.1;
        caughtFishAnim.opacity += (1 - caughtFishAnim.opacity) * 0.1;
    }

    requestAnimationFrame(render);
}

// --- ЛОГІКА ГРИ ---

mainBtn.addEventListener('click', () => {
    if(state === 'IDLE') {
        if(balance < 50) { alert("Недостатньо ⭐️! Поповніть у профілі."); return; }
        balance -= 50; updateStats();
        startCast();
    } else if(state === 'BITING') {
        pullFish();
    }
});

function startCast() {
    state = 'CASTING'; targetRodAngle = -5;
    mainBtn.disabled = true; msgBox.textContent = "ЗАКИДАЄМО...";
    setTimeout(() => {
        targetRodAngle = 25; state = 'WAITING';
        mainBtn.textContent = "ЧЕКАЙ...";
        setTimeout(triggerBite, Math.random() * 15000 + 10000);
    }, 1200);
}

function triggerBite() {
    if(state !== 'WAITING') return;
    state = 'BITING';
    mainBtn.disabled = false; mainBtn.textContent = "ТЯГНИ!!!";
    msgBox.textContent = "КЛЮЄ!!!";
    if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
    
    // 3 секунди на реакцію
    let biteTimer = setTimeout(() => {
        if(state === 'BITING') {
            state = 'IDLE'; msgBox.textContent = "ЗІРВАЛАСЯ... (x0)";
            resetGame();
        }
    }, 3000);
}

function pullFish() {
    state = 'PULLING';
    mainBtn.disabled = true;
    msgBox.textContent = "ТЯГНЕМО УЛОВ...";
    
    // Розрахунок шансів з урахуванням вудки
    let luckBonus = (rodLevel - 1) * 0.02; // +2% за рівень
    let fish = calculateCasinoFish(luckBonus);
    let multiplier = (Math.random() * (fish.maxX - fish.minX) + fish.minX).toFixed(1);
    let win = Math.floor(50 * multiplier);

    // Візуалізація риби на екрані
    caughtFishAnim = { 
        active: true, x: width * 0.4, y: height * 0.5, 
        scale: 0.1, opacity: 0, type: fish 
    };

    // Чекаємо 3 секунди перед вікном
    setTimeout(() => {
        balance += win;
        updateStats();
        showCatchModal(fish, multiplier, win);
    }, 3000);
}

function calculateCasinoFish(bonus) {
    let r = Math.random() - bonus; // Чим краща вудка, тим менше число (шанс на кращу рибу)
    let sum = 0;
    for(let f of fishDex) {
        sum += f.chance;
        if(r <= sum) return f;
    }
    return fishDex[0];
}

function showCatchModal(fish, x, win) {
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('catch-modal').style.display = 'block';
    document.getElementById('fish-name').textContent = fish.name;
    document.getElementById('fish-details').textContent = `Множник: x${x}`;
    document.getElementById('fish-price').textContent = win > 0 ? `+ ${win} ⭐️` : `0 ⭐️ (В МІНУС)`;
    
    if(win === 0) document.getElementById('fish-price').style.color = 'red';
    else document.getElementById('fish-price').style.color = '#2E7D32';
}

function resetGame() {
    state = 'IDLE';
    mainBtn.disabled = false;
    mainBtn.textContent = "ЗАКИД (50 ⭐️)";
    targetRodAngle = 30;
    caughtFishAnim.active = false;
}

function hideModals() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('catch-modal').style.display = 'none';
    resetGame();
}

// --- СИСТЕМА ПРОФІЛЮ ТА ПРОКАЧКИ ---

function showProfile() {
    document.getElementById('profile-page').style.display = 'flex';
    updateStats();
}

function hideProfile() {
    document.getElementById('profile-page').style.display = 'none';
}

function updateStats() {
    document.getElementById('balance-val').textContent = balance;
    document.getElementById('p-balance').textContent = balance;
    document.getElementById('rod-level-display').textContent = `Lvl ${rodLevel}`;
    document.getElementById('luck-display').textContent = `+${(rodLevel-1)*2}%`;
    document.getElementById('upgrade-cost').textContent = rodLevel * 200;
}

function upgradeRod() {
    let cost = rodLevel * 200;
    if(balance >= cost) {
        balance -= cost;
        rodLevel++;
        updateStats();
        alert("Вудка прокачана! Тепер шанси кращі!");
    } else {
        alert("Не вистачає зірочок для апгрейду!");
    }
}

function depositStars() {
    alert("Відкриття платіжного шлюзу Telegram Stars (1:1)...");
    // Тут буде виклик Telegram.WebApp.openInvoice()
}

function withdrawStars() {
    if(balance < 1000) return alert("Мінімальна сума виводу - 1000 ⭐️");
    alert(`Заявка на вивід ${balance} ⭐️ прийнята. Бот надішле подарунок.`);
}

initUser();
render();
</script>
</body>
</html>
