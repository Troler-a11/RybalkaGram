<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fishing 4D Pro - Ultimate Casino</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; }
        canvas { display: block; filter: contrast(1.1) brightness(1.05); }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* Glassmorphism HUD */
        .hud { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            color: #fff; padding: 12px 20px; border-radius: 20px; 
            border: 1px solid rgba(255, 215, 0, 0.4); 
            pointer-events: auto; cursor: pointer;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .hud:active { transform: scale(0.95); }
        
        .btn-main { 
            position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%);
            padding: 22px 70px; font-size: 26px; font-weight: 900; color: white;
            background: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%); 
            border: none; border-radius: 50px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.4), inset 0 -4px 0 rgba(0,0,0,0.2);
            pointer-events: auto; cursor: pointer; text-transform: uppercase;
        }
        .btn-main:active { transform: translateX(-50%) translateY(4px); box-shadow: none; }
        .btn-main:disabled { background: #444; box-shadow: none; color: #888; }

        /* Full Page Profile */
        .full-page-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            z-index: 1000; display: none; pointer-events: auto; color: white;
            flex-direction: column; align-items: center; justify-content: center;
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%} }

        .profile-card {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2);
            text-align: center; width: 85%; max-width: 400px;
        }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #FFD700; margin: 0 auto 20px; background: #222; box-shadow: 0 0 30px rgba(255,215,0,0.5); }
        
        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn-tg { padding: 18px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-deposit { background: #0088cc; color: white; box-shadow: 0 4px 15px rgba(0,136,204,0.4); }
        .btn-withdraw { background: #ffffff; color: #000; }
        
        #catch-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95); padding: 40px; border-radius: 30px; 
            width: 80%; max-width: 380px; text-align: center; display: none; 
            pointer-events: auto; z-index: 1100; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 900; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div class="hud" onclick="showProfile()">
        <div style="display:flex; align-items:center;">
            <div id="mini-avatar" style="width:35px; height:35px; border-radius:50%; background-size:cover; margin-right:12px; border:2px solid #FFD700;"></div>
            <div>
                <b id="user-name-hud" style="font-size:14px; opacity:0.8;">@user</b><br>
                <span id="balance-val" style="font-size:20px; font-weight:900; color:#FFD700;">50</span> ⭐️
            </div>
        </div>
    </div>
    <div id="msg-box" style="position:absolute; top: 120px; width:100%; text-align:center; color:white; font-size:22px; font-weight:900; text-shadow:0 0 10px #000;"></div>
    <button id="main-action" class="btn-main">ЗАКИД (50 ⭐️)</button>
</div>

<div id="profile-page" class="full-page-modal">
    <div class="profile-card">
        <div class="profile-avatar" id="large-avatar"></div>
        <h1 id="user-name-full" style="margin:10px 0;">@username</h1>
        <div style="font-size:32px; font-weight:900; color:#FFD700; margin-bottom:20px;"><span id="p-balance">50</span> ⭐️</div>
        
        <div class="btn-group">
            <button class="btn-tg btn-deposit" onclick="depositStars()">ПОПОВНИТИ (⭐️ ТГ)</button>
            <button class="btn-tg btn-withdraw" onclick="withdrawStars()">ВИВЕСТИ (Мін. 1000)</button>
        </div>
        <div style="margin-top:30px; opacity:0.6; cursor:pointer;" onclick="hideProfile()">← Назад до озера</div>
    </div>
</div>

<div id="overlay" class="overlay"></div>

<div id="catch-modal">
    <h1 id="fish-name" style="margin-top:0; color:#1a2a6c;">Окунь</h1>
    <p id="fish-details" style="font-size:18px; color:#555;"></p>
    <div id="fish-price" style="font-size:36px; font-weight:900; margin:20px 0;"></div>
    <button class="btn-main" style="position:static; transform:none; width:100%;" onclick="hideModals()">В КОШИК</button>
</div>

<script>
/**
 * FISHING 4D ENGINE v4.0 - ULTIMATE CASINO REPRODUCTION
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mainBtn = document.getElementById('main-action');
const msgBox = document.getElementById('msg-box');

let balance = 50;
let state = 'IDLE'; 
let width, height;
let waveOffset = 0;
let rodAngle = 30;
let targetRodAngle = 30;
let caughtFishAnim = { active: false, x: 0, y: 0, scale: 0, opacity: 0, type: null, shake: 0 };

// ПЕРЕРОБЛЕНІ РИБИ ТА ШАНСИ (Казино-математика)
const fishDex = [
    { id: 'boot', name: 'Старий черевик', minX: 0, maxX: 0, chance: 0.55, color: '#3e2723' },
    { id: 'perch', name: 'Річковий окунь', minX: 0.1, maxX: 1.1, chance: 0.30, color: '#4a5d23' },
    { id: 'catfish', name: 'Гігантський сом', minX: 1.1, maxX: 2.0, chance: 0.10, color: '#1a1a1a' },
    { id: 'shark', name: 'Велика акула', minX: 2.0, maxX: 5.0, chance: 0.04, color: '#546e7a' },
    { id: 'gold', name: 'Золота рибка', minX: 5.0, maxX: 10.0, chance: 0.01, color: '#ffb300' }
];

// Імітація ТГ
const tgData = { name: "Player_777", avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=777" };

function initApp() {
    document.getElementById('user-name-hud').textContent = "@" + tgData.name;
    document.getElementById('user-name-full').textContent = "@" + tgData.name;
    document.getElementById('mini-avatar').style.backgroundImage = `url(${tgData.avatar})`;
    document.getElementById('large-avatar').style.backgroundImage = `url(${tgData.avatar})`;
    document.getElementById('large-avatar').style.backgroundSize = "cover";
    resize();
    render();
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);

// ФУНКЦІЯ МАЛЮВАННЯ КОНКРЕТНОЇ РИБИ (НОВЕ)
function drawFishIcon(x, y, type, scale) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.fillStyle = type.color;

    if(type.id === 'boot') {
        // Малюємо черевик
        ctx.beginPath();
        ctx.moveTo(-20, 20); ctx.lineTo(20, 20); ctx.lineTo(20, -10);
        ctx.lineTo(0, -10); ctx.lineTo(0, -30); ctx.lineTo(-20, -30); ctx.closePath();
        ctx.fill();
    } else if(type.id === 'catfish') {
        // Сом з вусами
        ctx.beginPath(); ctx.ellipse(0, 0, 50, 25, 0, 0, Math.PI*2); ctx.fill();
        ctx.lineWidth = 2; ctx.strokeStyle = type.color;
        ctx.beginPath(); ctx.moveTo(40, 5); ctx.quadraticCurveTo(60, 20, 50, 30); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(40, -5); ctx.quadraticCurveTo(60, -20, 50, -30); ctx.stroke();
    } else if(type.id === 'shark') {
        // Акула з плавцем
        ctx.beginPath(); ctx.ellipse(0, 0, 60, 22, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(-20, -45); ctx.lineTo(-30, -20); ctx.fill();
    } else {
        // Окунь / Золота рибка
        ctx.beginPath(); ctx.ellipse(0, 0, 45, 20, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-35, 0); ctx.lineTo(-55, -20); ctx.lineTo(-55, 20); ctx.fill();
        if(type.id === 'gold') { ctx.shadowBlur = 15; ctx.shadowColor = "gold"; }
    }
    ctx.restore();
}

function render() {
    ctx.clearRect(0, 0, width, height);

    // BACKGROUND (Sky + Water)
    let sG = ctx.createLinearGradient(0, 0, 0, height*0.5);
    sG.addColorStop(0, '#1e3c72'); sG.addColorStop(1, '#2a5298');
    ctx.fillStyle = sG; ctx.fillRect(0, 0, width, height*0.5);

    waveOffset += 0.04;
    let wG = ctx.createLinearGradient(0, height*0.5, 0, height);
    wG.addColorStop(0, '#002147'); wG.addColorStop(1, '#000c18');
    ctx.fillStyle = wG; ctx.fillRect(0, height*0.5, width, height*0.5);

    // Waves
    ctx.strokeStyle = "rgba(255,255,255,0.05)";
    for(let i=0; i<6; i++) {
        ctx.beginPath(); ctx.moveTo(0, height*0.5 + i*50);
        for(let x=0; x<width; x+=30) {
            ctx.lineTo(x, height*0.5 + i*50 + Math.sin(x*0.01 + waveOffset + i)*15);
        }
        ctx.stroke();
    }

    // BRIDGE
    ctx.fillStyle = '#1a0f0d';
    ctx.beginPath();
    ctx.moveTo(width*0.05, height); ctx.lineTo(width*0.3, height*0.7);
    ctx.lineTo(width*0.7, height*0.7); ctx.lineTo(width*0.95, height);
    ctx.fill();

    // ROD
    rodAngle += (targetRodAngle - rodAngle) * 0.1;
    let rX = width * 0.85; let rY = height * 1.05;
    let tX = rX + Math.cos(rodAngle * Math.PI/180) * -450;
    let tY = rY + Math.sin(rodAngle * Math.PI/180) * -450;

    ctx.strokeStyle = '#000'; ctx.lineWidth = 10;
    ctx.beginPath(); ctx.moveTo(rX, rY); ctx.lineTo(tX, tY); ctx.stroke();

    // LINE & BOBBER
    if(state !== 'IDLE') {
        let bX = width*0.4;
        let bY = height*0.62 + Math.sin(waveOffset)*8;
        if(state === 'BITING') bY += Math.sin(Date.now()*0.04)*25;

        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(tX, tY); ctx.lineTo(bX, bY); ctx.stroke();

        ctx.fillStyle = "#ff0000"; ctx.beginPath(); ctx.arc(bX, bY, 12, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.fillRect(bX-2, bY, 4, 15);
    }

    // FISH CATCH ANIMATION
    if(caughtFishAnim.active) {
        let shake = Math.sin(Date.now()*0.05)*5;
        drawFishIcon(caughtFishAnim.x + shake, caughtFishAnim.y, caughtFishAnim.type, caughtFishAnim.scale);
        caughtFishAnim.y -= 1.5;
        caughtFishAnim.scale += (1.2 - caughtFishAnim.scale) * 0.05;
    }

    requestAnimationFrame(render);
}

// --- УНІВЕРСАЛЬНА ВІБРАЦІЯ (ВИПРАВЛЕНО) ---
function doVibrate(pattern) {
    if ("vibrate" in navigator) {
        // Деякі браузери потребують взаємодії користувача для активації API
        try { navigator.vibrate(pattern); } catch(e) {}
    }
}

mainBtn.addEventListener('click', () => {
    if(state === 'IDLE' && balance >= 50) {
        balance -= 50; updateStats();
        state = 'CASTING'; targetRodAngle = -5;
        mainBtn.disabled = true; msgBox.textContent = "ЗАКИНУТО...";
        setTimeout(() => {
            targetRodAngle = 22; state = 'WAITING';
            mainBtn.textContent = "ЧЕКАЙ...";
            setTimeout(onBite, Math.random() * 15000 + 10000);
        }, 1200);
    } else if(state === 'BITING') {
        onCatch();
    }
});

function onBite() {
    if(state !== 'WAITING') return;
    state = 'BITING';
    mainBtn.disabled = false; mainBtn.textContent = "ТЯГНИ!!!";
    msgBox.textContent = "КЛЮЄ!";
    doVibrate([100, 50, 100, 50, 200]);

    setTimeout(() => {
        if(state === 'BITING') {
            state = 'IDLE'; msgBox.textContent = "РЫБА ЗІРВАЛАСЯ (x0)";
            resetGameUI();
        }
    }, 3000);
}

function onCatch() {
    state = 'CATCHING';
    mainBtn.disabled = true;
    msgBox.textContent = "ВИЦІДЖУЄМО...";
    
    let roll = Math.random();
    let fish = fishDex[0];
    let sum = 0;
    for(let f of fishDex) {
        sum += f.chance;
        if(roll <= sum) { fish = f; break; }
    }

    let mult = (Math.random() * (fish.maxX - fish.minX) + fish.minX).toFixed(1);
    let win = Math.floor(50 * mult);

    caughtFishAnim = { active: true, x: width * 0.45, y: height * 0.5, scale: 0.2, type: fish };
    doVibrate(200);

    setTimeout(() => {
        balance += win;
        updateStats();
        showModal(fish, mult, win);
    }, 3000);
}

function showModal(fish, x, win) {
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('catch-modal').style.display = 'block';
    document.getElementById('fish-name').textContent = fish.name;
    document.getElementById('fish-details').textContent = `Множник: x${x}`;
    document.getElementById('fish-price').textContent = `+ ${win} ⭐️`;
    document.getElementById('fish-price').style.color = win > 0 ? "#2E7D32" : "#cc0000";
}

function resetGameUI() {
    state = 'IDLE';
    mainBtn.disabled = false;
    mainBtn.textContent = "ЗАКИД (50 ⭐️)";
    targetRodAngle = 30;
    caughtFishAnim.active = false;
}

function hideModals() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('catch-modal').style.display = 'none';
    resetGameUI();
}

function showProfile() { document.getElementById('profile-page').style.display = 'flex'; updateStats(); }
function hideProfile() { document.getElementById('profile-page').style.display = 'none'; }

function updateStats() {
    document.getElementById('balance-val').textContent = balance;
    document.getElementById('p-balance').textContent = balance;
}

function depositStars() { alert("Виклик оплати Telegram Stars..."); }
function withdrawStars() {
    if(balance < 1000) return alert("Мінімально 1000 ⭐️");
    alert("Запит на вивід подарунком надіслано боту!");
}

initApp();
</script>
</body>
</html>
