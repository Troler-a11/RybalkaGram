<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Fishing Real Money</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <div class="sky"><div class="cloud cloud1"></div></div>
    <div class="forest"></div>
    <div class="water">
        <div id="bobber-container">
            <div id="bobber"></div>
            <div id="fish-underwater" class="fish-shadow"></div>
        </div>
    </div>
    <div class="bridge"><div class="plank"></div><div class="plank"></div></div>

    <div id="rod-container">
        <div class="rod-handle"></div>
        <div id="rod-tip"></div>
        <div id="fishing-line"></div>
    </div>

    <div id="profile-screen" class="hidden overlay">
        <div class="card">
            <h2>Мій Профіль</h2>
            <p>Баланс: <span id="p-balance">50</span> ⭐️</p>
            <button onclick="topUp()">Поповнити (1 зірочка = 1 ⭐️)</button>
            <hr>
            <input type="number" id="withdraw-amount" placeholder="Сума (мін. 1000)">
            <button onclick="withdraw()">Вивести подарунком</button>
            <button class="close-btn" onclick="toggleProfile()">Назад до гри</button>
        </div>
    </div>

    <div id="catch-screen" class="hidden overlay">
        <div class="card">
            <h1 id="catch-title"></h1>
            <p id="catch-value"></p>
            <button id="btn-collect">Забрати</button>
        </div>
    </div>

    <div class="ui-top">
        <div class="stat-box" onclick="toggleProfile()">👤 Профіль: <span id="balance">50</span></div>
    </div>
    
    <div class="ui-bottom">
        <div id="game-msg">Закид: 50 ⭐️</div>
        <button id="btn-action">ЗАКИД</button>
    </div>
</div>

<script>
    let balance = 50;
    let gameState = 'idle';
    const fishTypes = [
        { name: 'Карась', base: 40, rarity: 0.5, color: '#8b4513' },
        { name: 'Сом', base: 120, rarity: 0.3, color: '#333' },
        { name: 'Акула', base: 500, rarity: 0.15, color: '#778899' },
        { name: 'Золота Рибка', base: 2000, rarity: 0.05, color: '#ffd700' }
    ];

    function updateUI() {
        document.getElementById('balance').textContent = balance;
        document.getElementById('p-balance').textContent = balance;
    }

    function toggleProfile() {
        document.getElementById('profile-screen').classList.toggle('hidden');
    }

    function topUp() {
        alert("Перехід до оплати зірочками Telegram...");
        balance += 100; // Приклад
        updateUI();
    }

    function withdraw() {
        const amt = document.getElementById('withdraw-amount').value;
        if (amt < 1000) return alert("Мінімум 1000!");
        if (amt > balance) return alert("Немає стільки!");
        balance -= amt;
        updateUI();
        alert(`Запит відправлено! Бот надішле подарунок на суму ${amt}.`);
    }

    document.getElementById('btn-action').addEventListener('click', () => {
        if (gameState === 'idle' && balance >= 50) {
            balance -= 50;
            updateUI();
            startFishing();
        } else if (gameState === 'biting') {
            catchFish();
        }
    });

    // Логіка рибалки аналогічна попередній, але з новими цінами
    function startFishing() {
        gameState = 'casting';
        document.getElementById('rod-container').classList.add('casting-animation');
        setTimeout(() => {
            gameState = 'waiting';
            document.getElementById('bobber-container').style.display = 'block';
            setTimeout(triggerBite, Math.random() * 20000 + 10000);
        }, 1500);
    }

    function triggerBite() {
        gameState = 'biting';
        document.getElementById('bobber').classList.add('bobber-biting');
        if (navigator.vibrate) navigator.vibrate(300);
        setTimeout(() => { if (gameState === 'biting') reset(); }, 3000);
    }

    function catchFish() {
        const fish = fishTypes[Math.floor(Math.random() * fishTypes.length)];
        const mult = (Math.random() * 20).toFixed(1);
        const win = Math.floor(fish.base * mult);
        balance += win;
        updateUI();
        document.getElementById('catch-title').textContent = fish.name;
        document.getElementById('catch-value').textContent = `Виграш: ${win} ⭐️ (x${mult})`;
        document.getElementById('catch-screen').classList.remove('hidden');
        reset();
    }

    function reset() {
        gameState = 'idle';
        document.getElementById('bobber-container').style.display = 'none';
        document.getElementById('rod-container').classList.remove('casting-animation');
    }

    document.getElementById('btn-collect').onclick = () => document.getElementById('catch-screen').classList.add('hidden');
</script>
</body>
</html>
