<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Псевдо-3D Рибалка</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        /* Псевдо-3D Фон */
        .sky { height: 40%; background: linear-gradient(#87CEEB, #E0F6FF); }
        .forest { height: 10%; background: #2d5a27; position: relative; }
        .water { height: 50%; background: #1e90ff; position: relative; overflow: hidden; }
        
        /* Місток */
        .bridge { 
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 200px; height: 150px; background: #5d4037; 
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            z-index: 10;
        }

        /* Вудка */
        .rod {
            position: absolute; bottom: -20px; right: 20%;
            width: 10px; height: 300px; background: #333;
            transform-origin: bottom center; transform: rotate(20deg);
            transition: transform 0.5s; z-index: 11;
        }
        .rod.cast { transform: rotate(-10deg); }

        /* Поплавок */
        #bobber {
            position: absolute; left: 50%; top: 20%;
            width: 15px; height: 30px; background: red;
            border-radius: 50% 50% 10% 10%; display: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        @keyframes bite { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
        .biting { animation: bite 0.2s infinite; }

        /* UI */
        .ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; text-shadow: 2px 2px 4px #000; z-index: 20; }
        #btn-action { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 20px 40px; font-size: 24px; border-radius: 50px; border: none;
            background: #4CAF50; color: white; display: block; z-index: 20;
        }
        #btn-action:disabled { background: #666; opacity: 0.7; }
        #msg { font-size: 20px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="sky"></div>
    <div class="forest"></div>
    <div class="water"><div id="bobber"></div></div>
    <div class="bridge"></div>
    <div class="rod" id="rod"></div>

    <div class="ui">
        <div id="score">Баланс: $0</div>
        <div id="msg">Натисни "Закинути", щоб почати</div>
    </div>
    
    <button id="btn-action">Закинути</button>
</div>

<script>
    const btn = document.getElementById('btn-action');
    const msg = document.getElementById('msg');
    const bobber = document.getElementById('bobber');
    const rod = document.getElementById('rod');
    const scoreEl = document.getElementById('score');

    let balance = 0;
    let gameState = 'idle'; // idle, waiting, biting
    let biteTimeout, catchTimer;

    const fishTypes = [
        { name: 'Риба', chance: 0.5, minSize: 10, maxSize: 30 },
        { name: 'Сом', chance: 0.3, minSize: 40, maxSize: 100 },
        { name: 'Акула', chance: 0.15, minSize: 150, maxSize: 500 },
        { name: 'Золота рибка', chance: 0.05, minSize: 5, maxSize: 15 }
    ];

    btn.addEventListener('click', () => {
        if (gameState === 'idle') {
            startFishing();
        } else if (gameState === 'biting') {
            catchFish();
        }
    });

    function startFishing() {
        gameState = 'waiting';
        btn.disabled = true;
        btn.textContent = 'Чекай...';
        msg.textContent = 'Чекаємо на кльов...';
        
        rod.classList.add('cast');
        setTimeout(() => { bobber.style.display = 'block'; }, 500);

        const waitTime = Math.random() * (30000 - 10000) + 10000;
        biteTimeout = setTimeout(triggerBite, waitTime);
    }

    function triggerBite() {
        gameState = 'biting';
        btn.disabled = false;
        btn.textContent = 'ТЯГНИ!';
        bobber.classList.add('biting');
        
        if ("vibrate" in navigator) navigator.vibrate([200, 100, 200]);

        catchTimer = setTimeout(() => {
            if (gameState === 'biting') {
                gameState = 'idle';
                msg.textContent = 'Риба зірвалася! х0';
                resetGame();
            }
        }, 3000);
    }

    function catchFish() {
        clearTimeout(catchTimer);
        const fish = fishTypes[Math.floor(Math.random() * fishTypes.length)];
        const size = (Math.random() * (fish.maxSize - fish.minSize) + fish.minSize).toFixed(1);
        const multiplier = (Math.random() * 20).toFixed(1);
        const profit = Math.floor(size * multiplier);
        
        balance += profit;
        scoreEl.textContent = `Баланс: $${balance}`;
        msg.textContent = `Зпіймано: ${fish.name} (${size}см) | Множник: x${multiplier} | +$${profit}`;
        
        gameState = 'idle';
        resetGame();
    }

    function resetGame() {
        bobber.style.display = 'none';
        bobber.classList.remove('biting');
        rod.classList.remove('cast');
        btn.disabled = false;
        btn.textContent = 'Закинути';
    }
</script>

</body>
</html>
