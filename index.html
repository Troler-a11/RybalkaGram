<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fishing 4D Pro - Russian Casino</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Arial, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* Улучшенный HUD */
        .hud { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(255, 255, 255, 0.95);
            color: #1a1a1a; padding: 15px 30px; border-radius: 50px; 
            border: 3px solid #FFD700; pointer-events: auto; cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: flex; align-items: center; z-index: 10;
        }
        
        .btn-main { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 25px 90px; font-size: 32px; font-weight: 900; color: white;
            background: linear-gradient(to bottom, #4CAF50, #2E7D32); border: none; border-radius: 100px;
            box-shadow: 0 12px 0 #1B5E20, 0 25px 40px rgba(0,0,0,0.4); pointer-events: auto; cursor: pointer;
            transition: all 0.1s; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-main:active:not(:disabled) { transform: translateX(-50%) translateY(8px); box-shadow: 0 4px 0 #1B5E20; }
        .btn-main:disabled { background: #555; box-shadow: 0 10px 0 #333; opacity: 0.7; }

        /* Прогресс-бар слева (чтобы не мешать катушке) */
        #reel-zone {
            position: absolute; left: 30px; top: 50%; transform: translateY(-50%);
            width: 40px; height: 350px; background: rgba(0,0,0,0.5);
            border-radius: 20px; border: 4px solid #FFD700; display: none; pointer-events: none; overflow: hidden;
        }
        #reel-progress {
            position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #FFD700, #40ff00);
            transition: height 0.15s cubic-bezier(0.17, 0.67, 0.83, 0.67); height: 0%;
        }

        /* Центральная интерактивная катушка */
        #center-reel-container {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 250px; display: none; pointer-events: auto; z-index: 500;
        }

        #profile-page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #f0f2f5 0%, #c3cfe2 100%); z-index: 2000; display: none; pointer-events: auto;
            flex-direction: column; align-items: center; padding-top: 60px;
        }
        .p-card {
            background: white; width: 85%; max-width: 450px; padding: 45px;
            border-radius: 50px; box-shadow: 0 30px 100px rgba(0,0,0,0.15);
            text-align: center; border: 1px solid rgba(0,0,0,0.05);
        }
        .p-avatar { width: 150px; height: 150px; border-radius: 50%; border: 6px solid #FFD700; margin: 0 auto 25px; background-size: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .btn-group { display: flex; flex-direction: column; gap: 18px; width: 100%; margin-top: 35px; }
        .btn-action { padding: 22px; border-radius: 25px; border: none; font-weight: 900; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .btn-action:hover { filter: brightness(1.1); }
        .dep-btn { background: #0088cc; color: white; }
        .wd-btn { background: #28a745; color: white; }
        
        #catch-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 50px; border-radius: 50px; width: 85%; max-width: 450px;
            text-align: center; display: none; pointer-events: auto; z-index: 3000;
            box-shadow: 0 0 150px rgba(0,0,0,0.6); border: 5px solid #FFD700;
        }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 1500; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div class="hud" onclick="showProfile()">
        <div id="mini-avatar" style="width:50px; height:50px; border-radius:50%; background:#ddd; margin-right:15px; border:3px solid #FFD700; background-size:cover;"></div>
        <div>
            <span id="u-name" style="font-weight:900; font-size:16px; color:#555;">@fisher</span><br>
            <span id="balance-val" style="font-size:26px; font-weight:900; color:#2E7D32;">50</span> <span style="color:#FFD700">⭐️</span>
        </div>
    </div>
    
    <div id="reel-zone">
        <div id="reel-progress"></div>
    </div>

    <div id="center-reel-container">
        <canvas id="reelCanvas" width="250" height="250"></canvas>
    </div>

    <div id="msg-box" style="position:absolute; top: 150px; width:100%; text-align:center; color:white; font-size:32px; font-weight:900; text-shadow:0 4px 15px rgba(0,0,0,1); letter-spacing:1px;"></div>
    <button id="main-action" class="btn-main">ЗАБРОС (50 ⭐️)</button>
</div>

<div id="profile-page">
    <div class="p-card">
        <div class="p-avatar" id="large-avatar"></div>
        <h1 id="full-u-name" style="margin:0; color:#333;">@fisher</h1>
        <div style="font-size:45px; font-weight:900; color:#2E7D32; margin: 15px 0;"><span id="p-balance">50</span> ⭐️</div>
        <div class="btn-group">
            <button class="btn-action dep-btn">ПОПОЛНИТЬ</button>
            <button class="btn-action wd-btn" onclick="withdraw()">ВЫВЕСТИ</button>
        </div>
        <p style="margin-top:40px; color:#aaa; font-weight:bold; cursor:pointer;" onclick="hideProfile()">ВЕРНУТЬСЯ К РЫБАЛКЕ</p>
    </div>
</div>

<div id="overlay" class="overlay"></div>

<div id="catch-modal">
    <h1 id="f-name" style="font-size:42px; margin:0; color:#333;">Улов!</h1>
    <p id="f-info" style="font-size:22px; color:#777; margin:10px 0;"></p>
    <div id="f-price" style="font-size:60px; font-weight:900; margin:30px 0;"></div>
    <button class="btn-main" style="position:static; transform:none; width:100%;" onclick="hideModals()">ЗАБРАТЬ</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const reelCanvas = document.getElementById('reelCanvas');
const rCtx = reelCanvas.getContext('2d');
const mainBtn = document.getElementById('main-action');
const msgBox = document.getElementById('msg-box');
const reelZone = document.getElementById('reel-zone');
const reelProgress = document.getElementById('reel-progress');
const reelContainer = document.getElementById('center-reel-container');

let balance = 50;
let state = 'IDLE'; 
let width, height;
let wavePos = 0;
let rodDeg = 35;
let targetDeg = 35;
let catchAnim = { active: false, x: 0, y: 0, s: 0, fish: null };

// Катушка и Прогресс
let currentProgress = 0;
let lastAngle = 0;
let totalRotation = 0;
let isDraggingReel = false;

const fishDatabase = [
    { id: 'boot', name: 'Старый ботинок', min: 0, max: 0, chance: 0.50, color: '#4E342E', dark: '#2D1B18' },
    { id: 'perch', name: 'Речной окунь', min: 0.2, max: 1.2, chance: 0.35, color: '#558B2F', dark: '#1B5E20' },
    { id: 'catfish', name: 'Жирный сом', min: 1.3, max: 2.5, chance: 0.09, color: '#37474F', dark: '#000000' },
    { id: 'shark', name: 'Белая акула', min: 2.6, max: 6.0, chance: 0.05, color: '#78909C', dark: '#263238' },
    { id: 'gold', name: 'Золотая рыбка', min: 8.0, max: 15.0, chance: 0.01, color: '#FFC107', dark: '#E65100' }
];

function init() {
    const user = { n: "MasterFisher", a: "https://api.dicebear.com/7.x/pixel-art/svg?seed=Lucky" };
    document.getElementById('u-name').textContent = "@" + user.n;
    document.getElementById('full-u-name').textContent = "@" + user.n;
    document.getElementById('mini-avatar').style.backgroundImage = `url(${user.a})`;
    document.getElementById('large-avatar').style.backgroundImage = `url(${user.a})`;
    resize();
    render();
    drawReelHandle(0);
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);

// --- ГРАФИКА: РЫБЫ И БОТИНОК ---
function drawRealisticFish(x, y, fish, scale) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    
    let g = ctx.createLinearGradient(0, -30, 0, 30);
    g.addColorStop(0, fish.color);
    g.addColorStop(1, fish.dark);
    ctx.fillStyle = g;

    if(fish.id === 'boot') {
        // Красивый ботинок без глаз
        ctx.beginPath();
        ctx.moveTo(-40, 30); ctx.quadraticCurveTo(-45, 30, -45, 25);
        ctx.lineTo(-45, -30); ctx.lineTo(-10, -30); ctx.lineTo(-10, 0);
        ctx.lineTo(30, 0); ctx.quadraticCurveTo(45, 0, 45, 15);
        ctx.lineTo(45, 30); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
        // Подошва
        ctx.fillStyle = '#111'; ctx.fillRect(-45, 25, 90, 8);
    } else {
        // Рыбы с градиентами
        ctx.beginPath(); ctx.ellipse(0, 0, 60, 30, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.stroke();
        // Хвост
        ctx.beginPath(); ctx.moveTo(-55, 0); ctx.lineTo(-85, -35); ctx.lineTo(-85, 35); ctx.closePath(); ctx.fill(); ctx.stroke();
        // Глаз (только у рыб)
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(40, -10, 8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(43, -10, 4, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

// --- ГРАФИКА КАТУШКИ ---
function drawReelHandle(angle) {
    rCtx.clearRect(0, 0, 250, 250);
    let cx = 125, cy = 125;
    
    // Корпус катушки
    rCtx.fillStyle = '#333';
    rCtx.beginPath(); rCtx.arc(cx, cy, 80, 0, Math.PI*2); rCtx.fill();
    rCtx.strokeStyle = '#FFD700'; rCtx.lineWidth = 5; rCtx.stroke();
    
    // Внутренний круг
    rCtx.fillStyle = '#444';
    rCtx.beginPath(); rCtx.arc(cx, cy, 60, 0, Math.PI*2); rCtx.fill();

    // Ручка
    rCtx.save();
    rCtx.translate(cx, cy);
    rCtx.rotate(angle);
    rCtx.fillStyle = '#FFD700';
    rCtx.fillRect(0, -10, 90, 20); // Рычаг
    rCtx.fillStyle = '#222';
    rCtx.beginPath(); rCtx.arc(90, 0, 20, 0, Math.PI*2); rCtx.fill(); // Пипка
    rCtx.restore();
}

// --- ЛОГИКА КРУЧЕНИЯ ---
function getAngle(x, y) {
    let rect = reelCanvas.getBoundingClientRect();
    let dx = x - (rect.left + rect.width/2);
    let dy = y - (rect.top + rect.height/2);
    return Math.atan2(dy, dx);
}

const handleReelMove = (e) => {
    if(!isDraggingReel || state !== 'REELING') return;
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    let currentAngle = getAngle(clientX, clientY);
    let diff = currentAngle - lastAngle;
    
    if (diff > Math.PI) diff -= Math.PI * 2;
    if (diff < -Math.PI) diff += Math.PI * 2;
    
    totalRotation += Math.abs(diff);
    lastAngle = currentAngle;
    
    drawReelHandle(currentAngle);
    
    // Заполнение бара
    currentProgress = Math.min(100, totalRotation * 2.5); 
    reelProgress.style.height = currentProgress + '%';
    
    if(currentProgress >= 100) finishCatch();
};

reelCanvas.addEventListener('mousedown', (e) => { isDraggingReel = true; lastAngle = getAngle(e.clientX, e.clientY); });
reelCanvas.addEventListener('touchstart', (e) => { isDraggingReel = true; lastAngle = getAngle(e.touches[0].clientX, e.touches[0].clientY); });
window.addEventListener('mousemove', handleReelMove);
window.addEventListener('touchmove', handleReelMove);
window.addEventListener('mouseup', () => isDraggingReel = false);
window.addEventListener('touchend', () => isDraggingReel = false);

// --- ОСНОВНОЙ ЦИКЛ ---
function render() {
    ctx.clearRect(0, 0, width, height);

    // НЕБО
    let skyG = ctx.createLinearGradient(0, 0, 0, height*0.5);
    skyG.addColorStop(0, '#00B4DB'); skyG.addColorStop(1, '#0083B0');
    ctx.fillStyle = skyG; ctx.fillRect(0, 0, width, height*0.5);

    // ВОДА (На весь экран по ширине)
    wavePos += 0.04;
    let waterG = ctx.createLinearGradient(0, height*0.5, 0, height);
    waterG.addColorStop(0, '#021B79'); waterG.addColorStop(1, '#0575E6');
    ctx.fillStyle = waterG; ctx.fillRect(0, height*0.5, width, height*0.5);

    // ВОЛНЫ (Исправлено заполнение)
    ctx.lineWidth = 3;
    for(let j=0; j<10; j++) {
        ctx.strokeStyle = `rgba(255,255,255,${0.12 - j*0.01})`;
        ctx.beginPath();
        for(let x=-50; x < width + 50; x += 20) {
            let y = height*0.52 + j*45 + Math.sin(x*0.015 + wavePos + j)*15;
            if(x === -50) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    // УДОЧКА (Видна полностью)
    rodDeg += (targetDeg - rodDeg) * 0.1;
    let rx = width * 0.92; let ry = height * 0.98;
    let rodLen = Math.min(width, height) * 0.7; // Адаптивная длина
    let tx = rx + Math.cos(rodDeg * Math.PI/180) * -rodLen;
    let ty = ry + Math.sin(rodDeg * Math.PI/180) * -rodLen;

    ctx.strokeStyle = '#222'; ctx.lineWidth = 14; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(tx, ty); ctx.stroke();
    
    // Кольца и леска
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3;
    for(let i=1; i<=4; i++) {
        ctx.beginPath(); ctx.arc(rx + (tx-rx)*(i/5), ry + (ty-ry)*(i/5), 7, 0, Math.PI*2); ctx.stroke();
    }

    if(state !== 'IDLE') {
        let bx = width*0.4;
        let by = height*0.65 + Math.sin(wavePos)*10;
        if(state === 'BITING' || state === 'REELING') by += Math.sin(Date.now()*0.06)*30;
        ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(bx, by); ctx.stroke();
        // Поплавок
        ctx.fillStyle = '#f44336'; ctx.beginPath(); ctx.arc(bx, by, 15, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.fillRect(bx-3, by-20, 6, 20);
    }

    if(catchAnim.active) {
        drawRealisticFish(catchAnim.x, catchAnim.y, catchAnim.fish, catchAnim.s);
        catchAnim.y -= 5;
        catchAnim.s += (1.8 - catchAnim.s) * 0.05;
    }
    requestAnimationFrame(render);
}

// --- ГЕЙМПЛЕЙ ---
mainBtn.addEventListener('click', () => {
    if(state === 'IDLE') {
        if(balance < 50) return alert("Нужно больше звезд!");
        balance -= 50; updateStats();
        state = 'CASTING'; targetDeg = -15;
        mainBtn.disabled = true; msgBox.textContent = "ЗАБРАСЫВАЕМ...";
        setTimeout(() => { targetDeg = 25; state = 'WAITING'; mainBtn.textContent = "ЖДИ...";
            setTimeout(startBite, Math.random() * 6000 + 5000);
        }, 1200);
    } else if(state === 'BITING') {
        startReelingMode();
    }
});

function startBite() {
    if(state !== 'WAITING') return;
    state = 'BITING'; mainBtn.disabled = false; mainBtn.textContent = "ТЯНИ!!!";
    msgBox.textContent = "КЛЮЁТ!"; safeVibrate([200, 100, 200]);
    setTimeout(() => { if(state === 'BITING') { state = 'IDLE'; msgBox.textContent = "УШЛА..."; resetUI(); } }, 3500);
}

function startReelingMode() {
    state = 'REELING'; mainBtn.disabled = true;
    msgBox.textContent = "КРУТИ КАТУШКУ!";
    reelZone.style.display = 'block'; reelContainer.style.display = 'block';
    currentProgress = 0; totalRotation = 0;
}

function finishCatch() {
    state = 'WINNING'; reelZone.style.display = 'none'; reelContainer.style.display = 'none';
    msgBox.textContent = "ЕСТЬ!";
    let r = Math.random(); let fish = fishDatabase[0]; let s = 0;
    for(let f of fishDatabase) { s += f.chance; if(r <= s) { fish = f; break; } }
    let m = (Math.random() * (fish.max - fish.min) + fish.min).toFixed(1);
    let win = Math.floor(50 * m);
    catchAnim = { active: true, x: width * 0.45, y: height * 0.6, s: 0.2, fish: fish };
    setTimeout(() => { balance += win; updateStats(); showModal(fish, m, win); }, 2000);
}

function showModal(fish, m, win) {
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('catch-modal').style.display = 'block';
    document.getElementById('f-name').textContent = fish.name;
    document.getElementById('f-info').textContent = win > 0 ? `Множитель x${m}` : "Просто мусор...";
    document.getElementById('f-price').textContent = `+ ${win} ⭐️`;
    document.getElementById('f-price').style.color = win > 0 ? "#2E7D32" : "#555";
}

function resetUI() { state = 'IDLE'; mainBtn.disabled = false; mainBtn.textContent = "ЗАБРОС (50 ⭐️)"; targetDeg = 35; catchAnim.active = false; }
function hideModals() { document.getElementById('overlay').style.display = 'none'; document.getElementById('catch-modal').style.display = 'none'; resetUI(); }
function showProfile() { document.getElementById('profile-page').style.display = 'flex'; updateStats(); }
function hideProfile() { document.getElementById('profile-page').style.display = 'none'; }
function updateStats() { document.getElementById('balance-val').textContent = balance; document.getElementById('p-balance').textContent = balance; }
function withdraw() { if(balance < 1000) return alert("Минимум 1000 ⭐️"); alert("Заявка принята!"); }
function safeVibrate(m) { if(navigator.vibrate) navigator.vibrate(m); }

init();
</script>
</body>
</html>
